name: HardPlayer Evolution (v21.0.0)

on:
  push:
    tags:
      - 'v21*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Package (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            os: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OS Packaging Tools & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm libarchive-tools zstd libdbus-1-dev libgirepository1.0-dev libcairo2-dev
          sudo gem install --no-document fpm

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          # ── CRITICAL FIX ──────────────────────────────────────────────────────
          # yt-dlp is intentionally EXCLUDED from pip install.
          # It is a declared fpm system dependency (-d yt-dlp), meaning the OS
          # package manager provides it at runtime. Adding it to pip caused Nuitka
          # to discover and bundle the entire yt-dlp source tree (hundreds of files)
          # via --follow-imports, which is what exploded build time to 80+ minutes
          # and massively inflated package size in v19. It must never be pip-installed
          # in this build environment.
          # ──────────────────────────────────────────────────────────────────────
          pip install PyQt6 python-mpv nuitka zstandard ordered-set dbus-python "PyGObject<3.51.0"

      # ── CACHING STRATEGY (as advised) ───────────────────────────────────────
      # Nuitka's compilation speed depends heavily on two cache layers:
      #
      # 1. __pycache__  — Python's bytecode cache (.pyc files). Nuitka reads these
      #    during its import-tracing phase. When present, Nuitka can resolve module
      #    dependencies without re-parsing raw .py source, significantly cutting the
      #    dependency-graph analysis phase.
      #
      # 2. ~/.cache/Nuitka — Nuitka's own C compilation cache (Scons + ccache).
      #    On cache hit, already-compiled C translation units are reused directly,
      #    skipping the most expensive gcc/clang compilation step entirely.
      #
      # Cache key is hashed on hardplayer.py so a source change invalidates the
      # cache and forces a clean recompile. The restore-keys fallback allows a
      # partial cache hit (e.g., after a source change) to still warm C-level caches.
      # ────────────────────────────────────────────────────────────────────────
      - name: Restore Nuitka Compilation Cache (__pycache__ & C-cache)
        uses: actions/cache@v4
        with:
          path: |
            __pycache__
            ~/.cache/Nuitka
          key: ${{ runner.os }}-nuitka-v21-${{ matrix.arch }}-${{ hashFiles('hardplayer.py') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-v21-${{ matrix.arch }}-

      - name: Build with Nuitka & Setup Desktop Entry
        run: |
          python -m nuitka \
            --standalone \
            --remove-output \
            --enable-plugin=pyqt6 \
            --follow-imports \
            --assume-yes-for-downloads \
            --nofollow-import-to=yt_dlp \
            hardplayer.py
          # ── WHY --nofollow-import-to=yt_dlp ──────────────────────────────────
          # This flag is the programmatic equivalent of the deleted project-options
          # file. It explicitly instructs Nuitka to treat the `yt_dlp` namespace as
          # an external/system dependency and stop tracing into it, even though
          # hardplayer.py imports from it. Without this guard, --follow-imports
          # causes Nuitka to recurse into all ~300+ yt-dlp submodules, compile each
          # to C, and bundle the resulting objects — the exact regression in v19.
          # ─────────────────────────────────────────────────────────────────────

          rm -f hardplayer.dist/libssl.so* hardplayer.dist/libcrypto.so*

          mkdir -p package_root/opt/hardplayer
          mkdir -p package_root/usr/bin
          cp -r hardplayer.dist/* package_root/opt/hardplayer/
          mv package_root/opt/hardplayer/hardplayer.bin package_root/opt/hardplayer/hardplayer-bin

          cp icon_in_app.png package_root/opt/hardplayer/

          echo '#!/bin/bash' > package_root/usr/bin/hardplayer
          echo 'export LD_LIBRARY_PATH=/opt/hardplayer:$LD_LIBRARY_PATH' >> package_root/usr/bin/hardplayer
          echo 'export QT_PLUGIN_PATH=/opt/hardplayer/PyQt6/Qt6/plugins' >> package_root/usr/bin/hardplayer
          echo 'exec /opt/hardplayer/hardplayer-bin "$@"' >> package_root/usr/bin/hardplayer
          chmod +x package_root/usr/bin/hardplayer

          mkdir -p package_root/usr/share/pixmaps
          mkdir -p package_root/usr/share/applications
          cp icon.png package_root/usr/share/pixmaps/hardplayer.png

          cat <<EOF > package_root/usr/share/applications/hardplayer.desktop
          [Desktop Entry]
          Name=HardPlayer
          Comment=Pro Media Player with Advanced YouTube Downloader
          Exec=hardplayer %U
          Icon=hardplayer
          Terminal=false
          Type=Application
          Categories=AudioVideo;Video;Player;
          MimeType=video/mp4;video/x-matroska;video/webm;video/x-msvideo;video/quicktime;video/x-flv;audio/mpeg;audio/x-wav;audio/flac;
          StartupNotify=true
          EOF

      - name: Generate Production Packages (DEB, RPM, Pacman)
        run: |
          DESC="HardPlayer v21: UX Overhaul with cascading menus and custom download locations."
          VER="21.0.0"
          ARCH="${{ matrix.arch }}"

          fpm -s dir -t deb -n hardplayer -v $VER -a $ARCH --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -d aria2 -C package_root .
          fpm -s dir -t rpm -n hardplayer -v $VER -a $ARCH --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -d aria2 -C package_root .
          fpm -s dir -t pacman -n hardplayer -v $VER -a $ARCH --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -d aria2 -C package_root .

      - name: Deploy Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v21')
        with:
          name: HardPlayer v21.0.0 - UX Overhaul & Custom Locations 🚀
          body: |
            ## 📥 Download Links
            | Architecture | Ubuntu / Debian | Fedora / Suse | Arch Linux |
            | :--- | :--- | :--- | :--- |
            | **x86-64 (64-bit)** | [Download DEB](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hardplayer_21.0.0_amd64.deb) | [Download RPM](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hardplayer-21.0.0-1.x86_64.rpm) | [Download Pacman](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hardplayer-21.0.0-1-x86_64.pkg.tar.zst) |

            ---

            ### ✨ What's New in v21.0.0?
            * **UX Improvements:** Fully reorganized the top menus (Hardware and YouTube) using cascading sub-menus for a cleaner, more intuitive interface.
            * **Custom Download Location:** Added a new feature to select and save a specific directory for YouTube videos and metadata info (.txt) files directly from the top menu.
          files: |
            *.deb
            *.rpm
            *.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}