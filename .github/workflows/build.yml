name: HardPlayer Evolution (v4.0.0)

on:
  push:
    tags:
      - 'v4*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Package (Linux Multi-Distro)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OS Packaging Tools & D-Bus Dependencies
        run: |
          sudo apt-get update
          # Added D-Bus and GLib development packages to ensure successful build of MPRIS2 libraries
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm libarchive-tools zstd libdbus-1-dev libgirepository1.0-dev libcairo2-dev
          sudo gem install --no-document fpm

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          # Added dbus-python and PyGObject to support KDE Connect integration
          pip install PyQt6 python-mpv nuitka zstandard ordered-set dbus-python PyGObject

      - name: Build with Nuitka (Standalone Optimization)
        run: |
          # Build the application with PyQt6 plugin enabled and assume-yes for downloads
          python -m nuitka --standalone --remove-output --enable-plugin=pyqt6 --assume-yes-for-downloads hardplayer.py
          
          # Clean up bundled crypto libraries to ensure compatibility with the host system's OpenSSL (Preventing Segfaults)
          rm -f hardplayer.dist/libssl.so* hardplayer.dist/libcrypto.so*
          
          mkdir -p package_root/opt/hardplayer
          mkdir -p package_root/usr/bin
          cp -r hardplayer.dist/* package_root/opt/hardplayer/
          mv package_root/opt/hardplayer/hardplayer.bin package_root/opt/hardplayer/hardplayer-bin
          
          # Create a wrapper script to set library paths dynamically
          echo '#!/bin/bash' > package_root/usr/bin/hardplayer
          echo 'export LD_LIBRARY_PATH=/opt/hardplayer:$LD_LIBRARY_PATH' >> package_root/usr/bin/hardplayer
          echo 'export QT_PLUGIN_PATH=/opt/hardplayer/PyQt6/Qt6/plugins' >> package_root/usr/bin/hardplayer
          echo 'exec /opt/hardplayer/hardplayer-bin "$@"' >> package_root/usr/bin/hardplayer
          chmod +x package_root/usr/bin/hardplayer

      - name: Generate Production Packages (DEB, RPM, Pacman)
        run: |
          # The package description reflects the new MPRIS2 system integration feature
          DESC="HardPlayer v4: High-performance Media Player with Full MPRIS2 Support (KDE Connect) and YouTube Quality Selection."
          
          # Generate packages
          fpm -s dir -t deb -n hardplayer -v 4.0.0 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -d openssl -C package_root .
          fpm -s dir -t rpm -n hardplayer -v 4.0.0 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -d openssl -C package_root .
          fpm -s dir -t pacman -n hardplayer -v 4.0.0 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -d openssl -C package_root .

      - name: Deploy Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v4')
        with:
          name: HardPlayer v4.0.0 - The MPRIS Update (KDE Connect) 📱🎬
          body: |
            ### What's New in v4.0.0?
            * **Full System Integration (MPRIS2)**: Control the player using `playerctl` and keyboard media keys.
            * **KDE Connect Support**: Play, Pause, and Seek directly from your phone or smartwatch.
            * **Rich Metadata Display**: Video titles and YouTube thumbnails now appear in system media notifications.
            * **Real-time Synchronization**: Instant updates for playback status and progress bar across the OS.
            * Plus existing features: High-performance Hardware Decoding and advanced YouTube quality selection.
          files: |
            *.deb
            *.rpm
            *.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}