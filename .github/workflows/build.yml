name: HardPlayer Evolution (v5.0.1)

on:
  push:
    tags:
      - 'v5*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Package (Linux Multi-Distro)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OS Packaging Tools & D-Bus Dependencies
        run: |
          sudo apt-get update
          # Required D-Bus and GLib development packages for MPRIS2 integration
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm libarchive-tools zstd libdbus-1-dev libgirepository1.0-dev libcairo2-dev
          sudo gem install --no-document fpm

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          # Dependencies including dbus-python and pinning PyGObject to <3.51.0 to avoid girepository-2.0 build errors
          pip install PyQt6 python-mpv nuitka zstandard ordered-set dbus-python "PyGObject<3.51.0"

      - name: Build with Nuitka & Setup Desktop Entry
        run: |
          # Build the application. Added --follow-imports to ensure all the new v5 modules are bundled.
          python -m nuitka --standalone --remove-output --enable-plugin=pyqt6 --follow-imports --assume-yes-for-downloads hardplayer.py
          
          # Clean up bundled crypto libraries to ensure compatibility with the host system's OpenSSL (Prevents Segfaults)
          rm -f hardplayer.dist/libssl.so* hardplayer.dist/libcrypto.so*
          
          mkdir -p package_root/opt/hardplayer
          mkdir -p package_root/usr/bin
          cp -r hardplayer.dist/* package_root/opt/hardplayer/
          mv package_root/opt/hardplayer/hardplayer.bin package_root/opt/hardplayer/hardplayer-bin
          
          # Create a wrapper script to set library paths dynamically
          echo '#!/bin/bash' > package_root/usr/bin/hardplayer
          echo 'export LD_LIBRARY_PATH=/opt/hardplayer:$LD_LIBRARY_PATH' >> package_root/usr/bin/hardplayer
          echo 'export QT_PLUGIN_PATH=/opt/hardplayer/PyQt6/Qt6/plugins' >> package_root/usr/bin/hardplayer
          echo 'exec /opt/hardplayer/hardplayer-bin "$@"' >> package_root/usr/bin/hardplayer
          chmod +x package_root/usr/bin/hardplayer

          # Setup Desktop Icon and .desktop file
          mkdir -p package_root/usr/share/pixmaps
          mkdir -p package_root/usr/share/applications
          
          # Copy your icon into the package
          cp icon.png package_root/usr/share/pixmaps/hardplayer.png
          
          # Generate the .desktop file
          cat <<EOF > package_root/usr/share/applications/hardplayer.desktop
          [Desktop Entry]
          Name=HardPlayer
          Comment=High-performance Modular Media Player
          Exec=hardplayer %U
          Icon=hardplayer
          Terminal=false
          Type=Application
          Categories=AudioVideo;Video;Player;
          StartupNotify=true
          EOF

      - name: Generate Production Packages (DEB, RPM, Pacman)
        run: |
          # Package description reflecting the v5 modular rewrite
          DESC="HardPlayer v5: Modular Architecture, High-performance Media Player with MPRIS2 Support & YouTube Integration."
          
          # Generate packages
          fpm -s dir -t deb -n hardplayer -v 5.0.1 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -d openssl -C package_root .
          fpm -s dir -t rpm -n hardplayer -v 5.0.1 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -d openssl -C package_root .
          fpm -s dir -t pacman -n hardplayer -v 5.0.1 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -d openssl -C package_root .

      - name: Deploy Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v5')
        with:
          name: HardPlayer v5.0.1 - The Modular Rebuild 🧩🚀
          body: |
            ### What's New in v5.0.1?
            * **CI/CD Fix**: Resolved a pipeline failure caused by breaking changes in the `PyGObject` library dependency tree.
            * **Modular Codebase**: Complete structural rewrite following the KISS philosophy. The code is now split into logical components (UI, MPRIS, HW Decoding, YouTube logic) making it lighter and easier to maintain.
            * **Optimized Compilation**: Enhanced Nuitka build process seamlessly integrates the new multi-file architecture into a single, highly-optimized standalone binary.
            * **Stable Integrations**: Retains full system MPRIS2 integration (KDE Connect), Hardware Decoding fallbacks, and advanced YouTube `yt-dlp` parsing.
            * **System Menu Integration**: Automatically installs the application icon and `.desktop` file so HardPlayer appears seamlessly in your app launcher.
          files: |
            *.deb
            *.rpm
            *.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}