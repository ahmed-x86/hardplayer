name: HardPlayer Production Build (v1.1.9)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: ubuntu-latest
            name: linux

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: python-setup@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 yt-dlp nuitka zstandard ordered-set

      - name: Install Packaging Tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm libarchive-tools zstd
          sudo gem install --no-document fpm

      - name: Build with Nuitka (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m nuitka --standalone --remove-output --enable-plugin=pyqt6 --include-qt-plugins=all --assume-yes-for-downloads hardplayer.py
          mkdir -p package_root/opt/hardplayer
          mkdir -p package_root/usr/bin
          cp -r hardplayer.dist/* package_root/opt/hardplayer/
          mv package_root/opt/hardplayer/hardplayer.bin package_root/opt/hardplayer/hardplayer-bin
          echo '#!/bin/bash' > package_root/usr/bin/hardplayer
          echo 'export LD_LIBRARY_PATH=/opt/hardplayer:$LD_LIBRARY_PATH' >> package_root/usr/bin/hardplayer
          echo 'export QT_PLUGIN_PATH=/opt/hardplayer/PyQt6/Qt6/plugins' >> package_root/usr/bin/hardplayer
          echo 'exec /opt/hardplayer/hardplayer-bin "$@"' >> package_root/usr/bin/hardplayer
          chmod +x package_root/usr/bin/hardplayer

      - name: Create Linux Packages (DEB, RPM, Arch)
        if: runner.os == 'Linux'
        run: |
          fpm -s dir -t deb -n hardplayer -v 1.1.9 -d ffmpeg -C package_root .
          fpm -s dir -t rpm -n hardplayer -v 1.1.9 -d ffmpeg -C package_root .
          fpm -s dir -t pacman -n hardplayer -v 1.1.9 -d ffmpeg -C package_root .

      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          # 1. Build
          python -m nuitka --standalone --remove-output --enable-plugin=pyqt6 --include-qt-plugins=all --assume-yes-for-downloads hardplayer.py
          
          # 2. Download FFmpeg SHARED build (Contains core DLLs needed for plugin to work)
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip" -OutFile "ffmpeg-shared.zip"
          Expand-Archive ffmpeg-shared.zip -DestinationPath temp_ffmpeg
          Copy-Item temp_ffmpeg\*\bin\*.dll -Destination hardplayer.dist\ -Force
          
          # 3. Copy ALL Qt DLLs
          $PyQt6Dir = python -c "import site, os; print(os.path.join(site.getsitepackages()[0], 'PyQt6'))"
          Copy-Item -Path "$PyQt6Dir\Qt6\bin\*.dll" -Destination "hardplayer.dist\" -Force
          
          # 4. Ensure Multimedia Plugins folder is intact
          $DestPlugins = "hardplayer.dist\PyQt6\Qt6\plugins"
          if (!(Test-Path $DestPlugins)) { New-Item -ItemType Directory -Force -Path $DestPlugins }
          Copy-Item -Path "$PyQt6Dir\Qt6\plugins\multimedia" -Destination $DestPlugins -Recurse -Force
          
          # 5. Compress
          Compress-Archive -Path hardplayer.dist -DestinationPath hardplayer-windows-x64.zip

      - name: Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            *.deb
            *.rpm
            *.zst
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}