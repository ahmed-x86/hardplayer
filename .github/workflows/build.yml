name: HardPlayer Evolution (v25.0.0)

on:
  push:
    tags:
      - 'v25.0*'

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 — STANDALONE (build-standalone)
  # ═══════════════════════════════════════════════════════════════════════════
  build-standalone:
    name: Build — Standalone
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OS Packaging & Compiler Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm libarchive-tools zstd libdbus-1-dev libgirepository1.0-dev libcairo2-dev
          sudo gem install --no-document fpm

      - name: Install Python Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 python-mpv nuitka zstandard ordered-set dbus-python "PyGObject<3.51.0"

      - name: Restore Nuitka Compilation Cache
        uses: actions/cache@v4
        with:
          path: |
            __pycache__
            ~/.cache/Nuitka
          key: ${{ runner.os }}-nuitka-standalone-${{ hashFiles('**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-standalone-

      - name: Compile with Nuitka (Standalone)
        run: |
          OPTS="--remove-output --follow-imports --assume-yes-for-downloads --standalone --enable-plugin=pyqt6"
          OPTS="$OPTS --nofollow-import-to=yt_dlp --nofollow-import-to=http --nofollow-import-to=gi --nofollow-import-to=dbus"
          OPTS="$OPTS --include-data-files=icon.png=icon.png --include-data-files=icon_in_app.png=icon_in_app.png"
          OPTS="$OPTS --file-reference-choice=runtime"
          python -m nuitka $OPTS hardplayer.py

      - name: Stage Package Tree
        run: |
          mkdir -p package_root/opt/hardplayer package_root/usr/bin
          rm -f hardplayer.dist/libssl.so* hardplayer.dist/libcrypto.so*
          cp -r hardplayer.dist/* package_root/opt/hardplayer/
          mv package_root/opt/hardplayer/hardplayer.bin package_root/opt/hardplayer/hardplayer-bin

          mkdir -p package_root/usr/share/pixmaps package_root/usr/share/applications
          cp icon.png package_root/usr/share/pixmaps/hardplayer.png 2>/dev/null || true

          cat <<'EOF' > package_root/usr/share/applications/hardplayer.desktop
          [Desktop Entry]
          Name=HardPlayer
          Comment=Pro Media Player with Advanced YouTube Downloader
          Exec=hardplayer %U
          Icon=hardplayer
          Terminal=false
          Type=Application
          Categories=AudioVideo;Video;Player;
          MimeType=video/mp4;video/x-matroska;video/webm;video/x-msvideo;video/quicktime;video/x-flv;audio/mpeg;audio/x-wav;audio/flac;
          StartupNotify=true
          EOF

      - name: Write Launcher Script (Standalone)
        run: |
          cat <<'EOF' > package_root/usr/bin/hardplayer
          #!/bin/bash
          export LD_LIBRARY_PATH=/opt/hardplayer:${LD_LIBRARY_PATH}
          export QT_PLUGIN_PATH=/opt/hardplayer/PyQt6/Qt6/plugins
          exec /opt/hardplayer/hardplayer-bin "$@"
          EOF
          chmod +x package_root/usr/bin/hardplayer

      - name: Build Packages (DEB, RPM, Pacman)
        run: |
          export PATH="$PATH:$(ruby -e 'print Gem.bindir'):$(ruby -e 'print Gem.user_dir')/bin"
          VER="25.0.0"
          PKG_NAME="hardplayer-standalone"
          DESC="HardPlayer v25.0.0 Standalone: Self-contained with fully bundled Qt6. No Qt installation required."
          BASE_DEPS="-d mpv -d ffmpeg -d yt-dlp -d aria2"

          fpm -s dir -t deb    -n "$PKG_NAME" -v "$VER" -a amd64  --description "$DESC" $BASE_DEPS -C package_root .
          fpm -s dir -t rpm    -n "$PKG_NAME" -v "$VER" -a x86_64 --description "$DESC" $BASE_DEPS -C package_root .
          fpm -s dir -t pacman -n "$PKG_NAME" -v "$VER" -a x86_64 --description "$DESC" $BASE_DEPS -C package_root .

      - name: Create Release & Upload Standalone Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v25.0')
        with:
          name: "HardPlayer v25.0.0 — MPRIS Fixed! 🚀"
          body: |
            ## 📥 Download Links

            | Variant | Ubuntu / Debian (DEB) | Fedora / Suse (RPM) | Arch Linux (Pacman) |
            | :--- | :--- | :--- | :--- |
            | **Standalone (Bundled Qt)** | [Download DEB](https://github.com/ahmed-x86/hardplayer/releases/download/v25.0.0/hardplayer-standalone_25.0.0_amd64.deb) | [Download RPM](https://github.com/ahmed-x86/hardplayer/releases/download/v25.0.0/hardplayer-standalone-25.0.0-1.x86_64.rpm) | [Download Pacman](https://github.com/ahmed-x86/hardplayer/releases/download/v25.0.0/hardplayer-standalone-25.0.0-1-x86_64.pkg.tar.zst) |
            | **System-Qt (Lightweight)** | [Download DEB](https://github.com/ahmed-x86/hardplayer/releases/download/v25.0.0/hardplayer-system-qt_25.0.0_amd64.deb) | [Download RPM](https://github.com/ahmed-x86/hardplayer/releases/download/v25.0.0/hardplayer-system-qt-25.0.0-1.x86_64.rpm) | [Download Pacman](https://github.com/ahmed-x86/hardplayer/releases/download/v25.0.0/hardplayer-system-qt-25.0.0-1-x86_64.pkg.tar.zst) |

            ---

            ### 🔧 What's Changed in v25.0.0?

            * **MPRIS Integration Fixed**: D-Bus and GLib modules are now correctly resolved by instructing the compiler to rely on the host system's native libraries. Media keys and external player controllers (like KDE Connect) now work flawlessly on built binaries.
            * **Embedded Assets**: UI icons are fully embedded.
            * **Ubuntu 24.04 Base**: Ensures proper PyQt6 dependency resolution for Debian-based systems.
          files: |
            *.deb
            *.rpm
            *.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — SYSTEM-QT (build-system-qt)
  # ═══════════════════════════════════════════════════════════════════════════
  build-system-qt:
    name: Build — System-Qt (${{ matrix.distro }})
    runs-on: ubuntu-latest
    needs: build-standalone

    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: arch
            container: archlinux:base-devel
            fpm_target: pacman
            pkg_arch_flag: "-a x86_64"
            install_cmd: "pacman -Syu --noconfirm python python-pip ruby ruby-erb patchelf ccache zstd git gcc make pkgconf dbus gobject-introspection cairo python-pyqt6 dbus-python python-gobject"
            pip_cmd: "python -m pip install --break-system-packages nuitka zstandard ordered-set python-mpv || python -m pip install nuitka zstandard ordered-set python-mpv"
            fpm_deps: "-d python -d python-pyqt6 -d dbus-python -d python-gobject"
            desc: "HardPlayer v25.0.0 System-Qt (Arch): Nuitka-compiled binary linked to Arch's native libpython."

          - distro: fedora
            container: fedora:latest
            fpm_target: rpm
            pkg_arch_flag: "-a x86_64"
            install_cmd: "dnf install -y gcc gcc-c++ python3 python3-pip python3-devel ruby ruby-devel rubygems make rpm-build zstd patchelf ccache git pkgconf-pkg-config dbus-devel cairo-devel cairo-gobject-devel gobject-introspection-devel python3-pyqt6 python3-dbus python3-gobject"
            pip_cmd: "python3 -m pip install --break-system-packages nuitka zstandard ordered-set python-mpv || python3 -m pip install nuitka zstandard ordered-set python-mpv"
            fpm_deps: "-d python3 -d python3-pyqt6 -d python3-dbus -d python3-gobject"
            desc: "HardPlayer v25.0.0 System-Qt (Fedora): Nuitka-compiled binary linked to Fedora's native libpython."

          - distro: ubuntu
            container: ubuntu:24.04
            fpm_target: deb
            pkg_arch_flag: "-a amd64"
            install_cmd: "apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y software-properties-common && add-apt-repository universe -y && apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y gcc g++ python3 python3-pip python3-dev ruby ruby-dev rubygems build-essential rpm libarchive-tools zstd patchelf ccache git libdbus-1-dev libgirepository1.0-dev libcairo2-dev pkg-config python3-pyqt6 python3-dbus python3-gi"
            pip_cmd: "python3 -m pip install --break-system-packages nuitka zstandard ordered-set python-mpv || python3 -m pip install nuitka zstandard ordered-set python-mpv"
            fpm_deps: "-d python3 -d python3-pyqt6 -d python3-dbus -d python3-gi"
            desc: "HardPlayer v25.0.0 System-Qt (Ubuntu): Nuitka-compiled binary linked to Ubuntu 24.04's native libpython."

    container:
      image: ${{ matrix.container }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Build Tools & UI Libraries
        run: ${{ matrix.install_cmd }}

      - name: Install fpm (Forced Bin Path)
        run: gem install fpm --no-user-install --bindir /usr/local/bin --no-document

      - name: Install Python Compilers & UI Libs via pip
        run: ${{ matrix.pip_cmd }}

      - name: Restore Nuitka Compilation Cache
        uses: actions/cache@v4
        with:
          path: |
            __pycache__
            ~/.cache/Nuitka
          key: ${{ runner.os }}-nuitka-system-qt-${{ matrix.distro }}-${{ hashFiles('**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-system-qt-${{ matrix.distro }}-

      - name: Compile with Nuitka (System-Qt — No Standalone)
        run: |
          OPTS="--remove-output --follow-imports --assume-yes-for-downloads --nofollow-import-to=yt_dlp --nofollow-import-to=http"
          OPTS="$OPTS --nofollow-import-to=gi --nofollow-import-to=dbus"
          OPTS="$OPTS --include-data-files=icon.png=icon.png --include-data-files=icon_in_app.png=icon_in_app.png"
          OPTS="$OPTS --file-reference-choice=runtime"
          python3 -m nuitka $OPTS hardplayer.py

      - name: Stage Package Tree
        run: |
          mkdir -p package_root/opt/hardplayer package_root/usr/bin
          cp hardplayer.bin package_root/opt/hardplayer/hardplayer-bin
          
          if [ -d "convert" ]; then cp -r convert package_root/opt/hardplayer/; fi
          
          cp icon_in_app.png package_root/opt/hardplayer/ 2>/dev/null || true
          mkdir -p package_root/usr/share/pixmaps package_root/usr/share/applications
          cp icon.png package_root/usr/share/pixmaps/hardplayer.png 2>/dev/null || true

          cat <<'EOF' > package_root/usr/share/applications/hardplayer.desktop
          [Desktop Entry]
          Name=HardPlayer
          Comment=Pro Media Player with Advanced YouTube Downloader
          Exec=hardplayer %U
          Icon=hardplayer
          Terminal=false
          Type=Application
          Categories=AudioVideo;Video;Player;
          MimeType=video/mp4;video/x-matroska;video/webm;video/x-msvideo;video/quicktime;video/x-flv;audio/mpeg;audio/x-wav;audio/flac;
          StartupNotify=true
          EOF

      - name: Write Launcher Script (System-Qt)
        run: |
          cat <<'EOF' > package_root/usr/bin/hardplayer
          #!/bin/bash
          exec /opt/hardplayer/hardplayer-bin "$@"
          EOF
          chmod +x package_root/usr/bin/hardplayer

      - name: Build Package (${{ matrix.fpm_target }})
        run: |
          VER="25.0.0"
          PKG_NAME="hardplayer-system-qt"
          BASE_DEPS="-d mpv -d ffmpeg -d yt-dlp -d aria2"

          fpm -s dir -t ${{ matrix.fpm_target }} \
              -n "$PKG_NAME" -v "$VER" \
              ${{ matrix.pkg_arch_flag }} \
              --description "${{ matrix.desc }}" \
              $BASE_DEPS ${{ matrix.fpm_deps }} \
              -C package_root .

      - name: Upload System-Qt Asset to Existing Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v25.0')
        with:
          files: |
            *.deb
            *.rpm
            *.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}