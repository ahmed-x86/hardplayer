name: HardPlayer Evolution (v10.0.0)

on:
  push:
    tags:
      - 'v10*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Package (Linux Multi-Distro)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OS Packaging Tools & D-Bus Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm libarchive-tools zstd libdbus-1-dev libgirepository1.0-dev libcairo2-dev
          sudo gem install --no-document fpm

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 python-mpv nuitka zstandard ordered-set dbus-python "PyGObject<3.51.0"

      - name: Build with Nuitka & Setup Desktop Entry
        run: |
          # بناء البرنامج مع التأكد من تضمين كافة الموديولات الجديدة (UI components & Logic)
          python -m nuitka --standalone --remove-output --enable-plugin=pyqt6 --follow-imports --assume-yes-for-downloads hardplayer.py
          
          # حذف مكتبات التشفير لضمان التوافقية مع توزيعات Linux المختلفة وتجنب Segfault
          rm -f hardplayer.dist/libssl.so* hardplayer.dist/libcrypto.so*
          
          mkdir -p package_root/opt/hardplayer
          mkdir -p package_root/usr/bin
          cp -r hardplayer.dist/* package_root/opt/hardplayer/
          mv package_root/opt/hardplayer/hardplayer.bin package_root/opt/hardplayer/hardplayer-bin
          
          echo '#!/bin/bash' > package_root/usr/bin/hardplayer
          echo 'export LD_LIBRARY_PATH=/opt/hardplayer:$LD_LIBRARY_PATH' >> package_root/usr/bin/hardplayer
          echo 'export QT_PLUGIN_PATH=/opt/hardplayer/PyQt6/Qt6/plugins' >> package_root/usr/bin/hardplayer
          echo 'exec /opt/hardplayer/hardplayer-bin "$@"' >> package_root/usr/bin/hardplayer
          chmod +x package_root/usr/bin/hardplayer

          mkdir -p package_root/usr/share/pixmaps
          mkdir -p package_root/usr/share/applications
          cp icon.png package_root/usr/share/pixmaps/hardplayer.png
          
          cat <<EOF > package_root/usr/share/applications/hardplayer.desktop
          [Desktop Entry]
          Name=HardPlayer
          Comment=VLC-Style Modular Player with Catppuccin Theme
          Exec=hardplayer %U
          Icon=hardplayer
          Terminal=false
          Type=Application
          Categories=AudioVideo;Video;Player;
          StartupNotify=true
          EOF

      - name: Generate Production Packages (DEB, RPM, Pacman)
        run: |
          DESC="HardPlayer v10: Advanced MPRIS integration with rich media metadata and native cover art / thumbnail support for desktop environments."
          
          # توليد الحزم بالإصدار الجديد 10.0.0
          fpm -s dir -t deb -n hardplayer -v 10.0.0 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -C package_root .
          fpm -s dir -t rpm -n hardplayer -v 10.0.0 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -C package_root .
          fpm -s dir -t pacman -n hardplayer -v 10.0.0 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -C package_root .

      - name: Deploy Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v10')
        with:
          name: HardPlayer v10.0.0 - MPRIS Art & Desktop Integration 🖼️✨
          body: |
            ### What's New in v10.0.0?
            * **Rich MPRIS Metadata:** Full integration with Linux desktop environments (Waybar, SwayNC, KDE, GNOME), now including **Cover Art / Thumbnails** for both local and online media.
            * **Local Video Thumbnails:** Automatically extracts a high-quality frame from local videos using a lightning-fast `ffmpeg` seek strategy, without freezing the player.
            * **Smart Thumbnail Caching:** Extracted local thumbnails are hashed and seamlessly cached to `~/.cache/hardplayer/thumbnails`, ensuring zero CPU overhead on replay.
            * **YouTube Artwork Integration:** Directly fetches and displays high-quality YouTube thumbnails in your system's media widget when playing online content.
            * Includes all previous v9 features (Native YouTube Search, fast parsing via `yt-dlp`, and Catppuccin-themed visual cards).
          files: |
            *.deb
            *.rpm
            *.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}