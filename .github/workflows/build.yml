name: HardPlayer Evolution (v22.0.0)

on:
  push:
    tags:
      - 'v22*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # النسخة الكاملة: مدمج معها PyQt6 (أكبر حجماً، تعمل على أي توزيعة)
          - variant: standalone
            pkg_suffix: standalone
            arch: x86_64

          # النسخة الخفيفة: تعتمد على PyQt6 من النظام (أصغر بكثير، للمحترفين)
          - variant: system-qt
            pkg_suffix: system-qt
            arch: x86_64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OS Packaging Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm libarchive-tools zstd libdbus-1-dev libgirepository1.0-dev libcairo2-dev
          sudo gem install --no-document fpm

      - name: Install Build Dependencies (Standalone)
        if: matrix.variant == 'standalone'
        run: |
          python -m pip install --upgrade pip
          # تثبيت PyQt6 هنا ليقوم Nuitka بدمجه
          pip install PyQt6 python-mpv nuitka zstandard ordered-set dbus-python "PyGObject<3.51.0"

      - name: Install Build Dependencies (System-Qt)
        if: matrix.variant == 'system-qt'
        run: |
          python -m pip install --upgrade pip
          # تثبيت PyQt6 من النظام وليس Pip
          sudo apt-get install -y python3-pyqt6
          # تثبيت الأدوات المساعدة فقط بدون PyQt6
          pip install python-mpv nuitka zstandard ordered-set dbus-python "PyGObject<3.51.0"

      # ── FIX: كاش لا يتأثر بتغيير الإصدار (v22 -> v23 لن يكسر الكاش) ──
      - name: Restore Nuitka Cache
        uses: actions/cache@v4
        with:
          path: |
            __pycache__
            ~/.cache/Nuitka
          key: ${{ runner.os }}-nuitka-${{ matrix.variant }}-${{ hashFiles('**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-${{ matrix.variant }}-

      - name: Compile with Nuitka
        run: |
          # الأساسيات المشتركة
          OPTS="--standalone --remove-output --follow-imports --assume-yes-for-downloads --nofollow-import-to=yt_dlp"
          
          # إضافات بناءً على النوع
          if [ "${{ matrix.variant }}" = "standalone" ]; then
            OPTS="$OPTS --enable-plugin=pyqt6"
          else
            OPTS="$OPTS --nofollow-import-to=PyQt6"
          fi

          python -m nuitka $OPTS hardplayer.py

      - name: Stage Package Tree
        run: |
          rm -f hardplayer.dist/libssl.so* hardplayer.dist/libcrypto.so*
          mkdir -p package_root/opt/hardplayer package_root/usr/bin
          cp -r hardplayer.dist/* package_root/opt/hardplayer/
          mv package_root/opt/hardplayer/hardplayer.bin package_root/opt/hardplayer/hardplayer-bin
          cp icon_in_app.png package_root/opt/hardplayer/
          
          # إنشاء ملف الـ Desktop
          mkdir -p package_root/usr/share/pixmaps package_root/usr/share/applications
          cp icon.png package_root/usr/share/pixmaps/hardplayer.png
          cat <<EOF > package_root/usr/share/applications/hardplayer.desktop
          [Desktop Entry]
          Name=HardPlayer (${{ matrix.variant }})
          Comment=Pro Media Player (Variant: ${{ matrix.variant }})
          Exec=hardplayer %U
          Icon=hardplayer
          Terminal=false
          Type=Application
          Categories=AudioVideo;Video;Player;
          MimeType=video/mp4;video/x-matroska;video/webm;video/x-msvideo;video/quicktime;video/x-flv;audio/mpeg;audio/x-wav;audio/flac;
          EOF

      - name: Create Launcher Script
        run: |
          cat <<'EOF' > package_root/usr/bin/hardplayer
          #!/bin/bash
          export LD_LIBRARY_PATH=/opt/hardplayer:$LD_LIBRARY_PATH
          # لو النسخة system-qt، نوجه البرنامج لمكتبات بايثون النظام
          if [ -d "/usr/lib/python3/dist-packages" ]; then
            export PYTHONPATH=/usr/lib/python3/dist-packages:$PYTHONPATH
          fi
          # لو النسخة standalone، نوجه للـ Plugins المدمجة
          if [ -d "/opt/hardplayer/PyQt6/Qt6/plugins" ]; then
            export QT_PLUGIN_PATH=/opt/hardplayer/PyQt6/Qt6/plugins
          fi
          exec /opt/hardplayer/hardplayer-bin "$@"
          EOF
          chmod +x package_root/usr/bin/hardplayer

      - name: Build Packages (DEB, RPM, Pacman)
        run: |
          VER="22.0.0"
          PKG_NAME="hardplayer-${{ matrix.pkg_suffix }}"
          DEPS="-d mpv -d ffmpeg -d yt-dlp -d aria2"
          
          # إضافة PyQt6 كاعتمادية نظام فقط في نسخة الـ System-Qt
          if [ "${{ matrix.variant }}" = "system-qt" ]; then
             DEPS="$DEPS -d python3-pyqt6"
          fi

          fpm -s dir -t deb -n $PKG_NAME -v $VER -a amd64 $DEPS -C package_root .
          fpm -s dir -t rpm -n $PKG_NAME -v $VER -a x86_64 $DEPS -C package_root .
          fpm -s dir -t pacman -n $PKG_NAME -v $VER -a x86_64 $DEPS -C package_root .

      - name: Deploy Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v22')
        with:
          name: HardPlayer v22.0.0 - Dual Variant Release 🚀
          body: |
            ## 📥 Download Links
            
            ### 🔵 Standalone Build (Includes Qt6)
            *Recommended for Ubuntu, Fedora, and General Linux.*
            * [DEB](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hardplayer-standalone_22.0.0_amd64.deb) | [RPM](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hardplayer-standalone-22.0.0-1.x86_64.rpm) | [Pacman](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hardplayer-standalone-22.0.0-1-x86_64.pkg.tar.zst)

            ### 🟢 System-Qt Build (Uses Native Qt6)
            *Lightweight, requires `python3-pyqt6` installed on system.*
            * [DEB](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hardplayer-system-qt_22.0.0_amd64.deb) | [RPM](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hardplayer-system-qt-22.0.0-1.x86_64.rpm) | [Pacman](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hardplayer-system-qt-22.0.0-1-x86_64.pkg.tar.zst)
          files: |
            *.deb
            *.rpm
            *.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}