name: HardPlayer Evolution (v17.0.0)

on:
  push:
    tags:
      - 'v17*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Package (Linux Multi-Distro)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OS Packaging Tools & D-Bus Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm libarchive-tools zstd libdbus-1-dev libgirepository1.0-dev libcairo2-dev
          sudo gem install --no-document fpm

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 python-mpv nuitka zstandard ordered-set dbus-python "PyGObject<3.51.0" yt-dlp

      - name: Build with Nuitka & Setup Desktop Entry
        run: |
          # Nuitka will automatically follow imports for all new modules (youtube_feature.py, ui_components.py, top_menu.py, etc.)
          python -m nuitka --standalone --remove-output --enable-plugin=pyqt6 --follow-imports --assume-yes-for-downloads hardplayer.py
          
          rm -f hardplayer.dist/libssl.so* hardplayer.dist/libcrypto.so*
          
          mkdir -p package_root/opt/hardplayer
          mkdir -p package_root/usr/bin
          cp -r hardplayer.dist/* package_root/opt/hardplayer/
          mv package_root/opt/hardplayer/hardplayer.bin package_root/opt/hardplayer/hardplayer-bin
          
          # Copy icon to ensure it appears inside the app
          cp icon_in_app.png package_root/opt/hardplayer/
          
          echo '#!/bin/bash' > package_root/usr/bin/hardplayer
          echo 'export LD_LIBRARY_PATH=/opt/hardplayer:$LD_LIBRARY_PATH' >> package_root/usr/bin/hardplayer
          echo 'export QT_PLUGIN_PATH=/opt/hardplayer/PyQt6/Qt6/plugins' >> package_root/usr/bin/hardplayer
          echo 'exec /opt/hardplayer/hardplayer-bin "$@"' >> package_root/usr/bin/hardplayer
          chmod +x package_root/usr/bin/hardplayer

          mkdir -p package_root/usr/share/pixmaps
          mkdir -p package_root/usr/share/applications
          cp icon.png package_root/usr/share/pixmaps/hardplayer.png
          
          cat <<EOF > package_root/usr/share/applications/hardplayer.desktop
          [Desktop Entry]
          Name=HardPlayer
          Comment=Pro Media Player with Fast YouTube Downloader
          Exec=hardplayer %U
          Icon=hardplayer
          Terminal=false
          Type=Application
          Categories=AudioVideo;Video;Player;
          MimeType=video/mp4;video/x-matroska;video/webm;video/x-msvideo;video/quicktime;video/x-flv;audio/mpeg;audio/x-wav;audio/flac;
          StartupNotify=true
          EOF

      - name: Generate Production Packages (DEB, RPM, Pacman)
        run: |
          DESC="HardPlayer v17: Introducing Smart Formats & Unified Advanced UI. Set default YouTube extensions with intelligent fallbacks and enjoy a seamless downloading experience."
          
          # Added aria2 as a dependency for high-speed downloads
          fpm -s dir -t deb -n hardplayer -v 17.0.0 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -d aria2 -C package_root .
          fpm -s dir -t rpm -n hardplayer -v 17.0.0 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -d aria2 -C package_root .
          fpm -s dir -t pacman -n hardplayer -v 17.0.0 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -d aria2 -C package_root .

      - name: Deploy Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v17')
        with:
          name: HardPlayer v17.0.0 - Smart Formats & Unified UI 🚀
          body: |
            ### What's New in v17.0.0?
            * **Preferred YouTube Extension:** Added a new Top Menu option to set your default YouTube format (`mp4`, `mkv`, `webm`). HardPlayer remembers your choice via a local cache and applies it automatically to both streaming and downloading!
            * **Smart Format Fallback:** If your preferred extension isn't available for a specific resolution (e.g., requesting 4K mp4), the UI intelligently detects available formats and displays a fallback message like `(webm because not found mp4)` right on the quality button.
            * **Unified Advanced Menu:** The advanced download dialog has been completely overhauled. It now uses the same beautiful, information-rich table UI as the streaming advanced menu, featuring a seamless "Download Mode".
            
            **Technical Improvements:**
            * Optimized `yt-dlp` JSON extraction to dynamically parse available extensions per resolution.
            * Centralized UI components to respect the DRY (Don't Repeat Yourself) principle, making the codebase cleaner and faster.
          files: |
            *.deb
            *.rpm
            *.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}