name: HardPlayer Production Build (v1.0.5)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
          - os: ubuntu-latest
            arch: x86_64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: x64

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 yt-dlp nuitka zstandard ordered-set

      - name: Build with Nuitka (Linux)
        if: runner.os == 'Linux'
        run: |
          # إضافة --include-qt-plugins=all هي السر في حل مشكلة الشاشة السوداء
          python -m nuitka --standalone --remove-output --include-qt-plugins=all hardplayer.py
          # ضغط المجلد الناتج لضمان نقل كل المكتبات
          tar -czf hardplayer-linux-x64.tar.gz hardplayer.dist/

      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          # بناء نسخة ويندوز مستقلة مع كل التعريفات
          python -m nuitka --standalone --remove-output --windows-disable-console --assume-yes-for-downloads --include-qt-plugins=all hardplayer.py
          # ضغط المجلد في ملف Zip
          Compress-Archive -Path hardplayer.dist -DestinationPath hardplayer-windows-x64.zip

      - name: Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            *.tar.gz
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}