name: HardPlayer Evolution (v15.0.0)

on:
  push:
    tags:
      - 'v15*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Package (Linux Multi-Distro)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OS Packaging Tools & D-Bus Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm libarchive-tools zstd libdbus-1-dev libgirepository1.0-dev libcairo2-dev
          sudo gem install --no-document fpm

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 python-mpv nuitka zstandard ordered-set dbus-python "PyGObject<3.51.0"

      - name: Build with Nuitka & Setup Desktop Entry
        run: |
          # Nuitka will automatically follow imports to the new modular files (playback_manager.py, cli_handler.py, etc.)
          python -m nuitka --standalone --remove-output --enable-plugin=pyqt6 --follow-imports --assume-yes-for-downloads hardplayer.py
          
          rm -f hardplayer.dist/libssl.so* hardplayer.dist/libcrypto.so*
          
          mkdir -p package_root/opt/hardplayer
          mkdir -p package_root/usr/bin
          cp -r hardplayer.dist/* package_root/opt/hardplayer/
          mv package_root/opt/hardplayer/hardplayer.bin package_root/opt/hardplayer/hardplayer-bin
          
          # Copy icon to ensure it appears inside the app
          cp icon_in_app.png package_root/opt/hardplayer/
          
          echo '#!/bin/bash' > package_root/usr/bin/hardplayer
          echo 'export LD_LIBRARY_PATH=/opt/hardplayer:$LD_LIBRARY_PATH' >> package_root/usr/bin/hardplayer
          echo 'export QT_PLUGIN_PATH=/opt/hardplayer/PyQt6/Qt6/plugins' >> package_root/usr/bin/hardplayer
          echo 'exec /opt/hardplayer/hardplayer-bin "$@"' >> package_root/usr/bin/hardplayer
          chmod +x package_root/usr/bin/hardplayer

          mkdir -p package_root/usr/share/pixmaps
          mkdir -p package_root/usr/share/applications
          cp icon.png package_root/usr/share/pixmaps/hardplayer.png
          
          cat <<EOF > package_root/usr/share/applications/hardplayer.desktop
          [Desktop Entry]
          Name=HardPlayer
          Comment=Modular & Fast Media Player with Dynamic YouTube Quality
          Exec=hardplayer %U
          Icon=hardplayer
          Terminal=false
          Type=Application
          Categories=AudioVideo;Video;Player;
          MimeType=video/mp4;video/x-matroska;video/webm;video/x-msvideo;video/quicktime;video/x-flv;audio/mpeg;audio/x-wav;audio/flac;
          StartupNotify=true
          EOF

      - name: Generate Production Packages (DEB, RPM, Pacman)
        run: |
          DESC="HardPlayer v15: Modular architecture refactoring for easier maintenance. Features a new Dynamic YouTube Quality UI (Simple & Advanced modes)."
          
          fpm -s dir -t deb -n hardplayer -v 15.0.0 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -C package_root .
          fpm -s dir -t rpm -n hardplayer -v 15.0.0 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -C package_root .
          fpm -s dir -t pacman -n hardplayer -v 15.0.0 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -C package_root .

      - name: Deploy Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v15')
        with:
          name: HardPlayer v15.0.0 - Modular Refactor & Pro YouTube Flow 🚀
          body: |
            ### What's New in v15.0.0?
            * **Modular Architecture:** The `main_window.py` has been dismantled into focused modules (`playback_manager.py`, `cli_handler.py`, etc.). This makes the code 100% easier to maintain and faster to load.
            * **Dynamic YouTube Quality Flow:** * **Simple UI:** Automatically detects and displays only the resolutions available for that specific video.
                * **Advanced Mode:** A fallback for pro-users who want to input manual format codes (e.g., `137+140`).
            * **Performance Polish:** Decoupled the MPV engine logic from the UI thread to ensure zero-lag during heavy operations.
            
            **Technical Improvements:**
            * Improved CLI handling for faster terminal launches.
            * Cleaned up redundant CSS logic by centralizing themes in `styles.py`.
            * Native Window ID (WID) management is now handled by the specialized `VideoSurface` module.
          files: |
            *.deb
            *.rpm
            *.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}