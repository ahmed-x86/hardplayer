name: HardPlayer Production Build (v1.1.1)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: ubuntu-latest
            name: linux

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 yt-dlp nuitka zstandard ordered-set

      - name: Install Packaging Tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm libarchive-tools zstd
          sudo gem install --no-document fpm

      - name: Build with Nuitka (Linux)
        if: runner.os == 'Linux'
        run: |
          # Build as standalone to ensure ABI compatibility across distros
          python -m nuitka --standalone --remove-output --enable-plugin=pyqt6 --assume-yes-for-downloads hardplayer.py
          
          # Create standard Linux filesystem structure (/opt and /usr/bin)
          mkdir -p package_root/opt/hardplayer
          mkdir -p package_root/usr/bin
          
          # Move all standalone files to /opt/hardplayer/
          cp -r hardplayer.dist/* package_root/opt/hardplayer/
          
          # Create a symlink in /usr/bin pointing to the /opt binary
          # Note: Nuitka generates a wrapper script and a .bin file. We link the wrapper.
          ln -s /opt/hardplayer/hardplayer package_root/usr/bin/hardplayer

      - name: Create Linux Packages (DEB, RPM, Arch)
        if: runner.os == 'Linux'
        run: |
          # -d ffmpeg tells apt/pacman/dnf to download FFmpeg automatically
          fpm -s dir -t deb -n hardplayer -v 1.1.1 -d ffmpeg -C package_root .
          fpm -s dir -t rpm -n hardplayer -v 1.1.1 -d ffmpeg -C package_root .
          fpm -s dir -t pacman -n hardplayer -v 1.1.1 -d ffmpeg -C package_root .

      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          # Build standalone for Windows. Assumes FFmpeg is in system PATH.
          python -m nuitka --standalone --remove-output --windows-disable-console --assume-yes-for-downloads --enable-plugin=pyqt6 hardplayer.py
          Compress-Archive -Path hardplayer.dist -DestinationPath hardplayer-windows-x64.zip

      - name: Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            *.deb
            *.rpm
            *.zst
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}