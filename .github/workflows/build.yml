name: HardPlayer Evolution (v16.0.0)

on:
  push:
    tags:
      - 'v16*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Package (Linux Multi-Distro)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OS Packaging Tools & D-Bus Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm libarchive-tools zstd libdbus-1-dev libgirepository1.0-dev libcairo2-dev
          sudo gem install --no-document fpm

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 python-mpv nuitka zstandard ordered-set dbus-python "PyGObject<3.51.0" yt-dlp

      - name: Build with Nuitka & Setup Desktop Entry
        run: |
          # Nuitka will automatically follow imports for all new modules (youtube_feature.py, ui_components.py, etc.)
          python -m nuitka --standalone --remove-output --enable-plugin=pyqt6 --follow-imports --assume-yes-for-downloads hardplayer.py
          
          rm -f hardplayer.dist/libssl.so* hardplayer.dist/libcrypto.so*
          
          mkdir -p package_root/opt/hardplayer
          mkdir -p package_root/usr/bin
          cp -r hardplayer.dist/* package_root/opt/hardplayer/
          mv package_root/opt/hardplayer/hardplayer.bin package_root/opt/hardplayer/hardplayer-bin
          
          # Copy icon to ensure it appears inside the app
          cp icon_in_app.png package_root/opt/hardplayer/
          
          echo '#!/bin/bash' > package_root/usr/bin/hardplayer
          echo 'export LD_LIBRARY_PATH=/opt/hardplayer:$LD_LIBRARY_PATH' >> package_root/usr/bin/hardplayer
          echo 'export QT_PLUGIN_PATH=/opt/hardplayer/PyQt6/Qt6/plugins' >> package_root/usr/bin/hardplayer
          echo 'exec /opt/hardplayer/hardplayer-bin "$@"' >> package_root/usr/bin/hardplayer
          chmod +x package_root/usr/bin/hardplayer

          mkdir -p package_root/usr/share/pixmaps
          mkdir -p package_root/usr/share/applications
          cp icon.png package_root/usr/share/pixmaps/hardplayer.png
          
          cat <<EOF > package_root/usr/share/applications/hardplayer.desktop
          [Desktop Entry]
          Name=HardPlayer
          Comment=Pro Media Player with Fast YouTube Downloader
          Exec=hardplayer %U
          Icon=hardplayer
          Terminal=false
          Type=Application
          Categories=AudioVideo;Video;Player;
          MimeType=video/mp4;video/x-matroska;video/webm;video/x-msvideo;video/quicktime;video/x-flv;audio/mpeg;audio/x-wav;audio/flac;
          StartupNotify=true
          EOF

      - name: Generate Production Packages (DEB, RPM, Pacman)
        run: |
          DESC="HardPlayer v16: Introducing the Pro YouTube Downloader. Fetch videos with Aria2 acceleration, real-time speed monitoring, and advanced format selection."
          
          # Added aria2 as a dependency for high-speed downloads
          fpm -s dir -t deb -n hardplayer -v 16.0.0 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -d aria2 -C package_root .
          fpm -s dir -t rpm -n hardplayer -v 16.0.0 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -d aria2 -C package_root .
          fpm -s dir -t pacman -n hardplayer -v 16.0.0 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -d aria2 -C package_root .

      - name: Deploy Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v16')
        with:
          name: HardPlayer v16.0.0 - The YouTube Downloader Update 📥
          body: |
            ### What's New in v16.0.0?
            * **YouTube Video Downloader:** A fully integrated acquiring engine. No more copy-pasting to external tools.
                * **Aria2 Acceleration:** Support for 16 parallel connections for ultra-fast acquiring.
                * **Advanced Selection:** Choose between dynamic simple qualities or manual format IDs (Video ID + Audio ID).
                * **Real-time Analytics:** Monitor download speed, fileside, and exact time left (ETA) directly in the UI.
            * **Refined Progress System:** Re-designed progress bars with Catppuccin Green styling and Mauve-colored metrics for perfect visibility.
            * **Metadata Extractor:** Automatically fetches uploader name, upload date, likes, and comment counts for every download.
            
            **Technical Fixes:**
            * Fixed a crash when video metadata (likes/comments) was unavailable from YouTube API.
            * Improved ANSI cleaning to ensure speed and progress text are clear in PyQt6.
            * Optimized background threading for zero-freeze UI during active downloads.
          files: |
            *.deb
            *.rpm
            *.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}