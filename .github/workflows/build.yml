name: HardPlayer Evolution (v19.0.0)

on:
  push:
    tags:
      - 'v19*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Package (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            os: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OS Packaging Tools & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm libarchive-tools zstd libdbus-1-dev libgirepository1.0-dev libcairo2-dev
          sudo gem install --no-document fpm

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 python-mpv nuitka zstandard ordered-set dbus-python "PyGObject<3.51.0" yt-dlp

      - name: Build with Nuitka & Setup Desktop Entry
        run: |
          python -m nuitka --standalone --remove-output --enable-plugin=pyqt6 --follow-imports --assume-yes-for-downloads hardplayer.py
          
          rm -f hardplayer.dist/libssl.so* hardplayer.dist/libcrypto.so*
          
          mkdir -p package_root/opt/hardplayer
          mkdir -p package_root/usr/bin
          cp -r hardplayer.dist/* package_root/opt/hardplayer/
          mv package_root/opt/hardplayer/hardplayer.bin package_root/opt/hardplayer/hardplayer-bin
          
          cp icon_in_app.png package_root/opt/hardplayer/
          
          echo '#!/bin/bash' > package_root/usr/bin/hardplayer
          echo 'export LD_LIBRARY_PATH=/opt/hardplayer:$LD_LIBRARY_PATH' >> package_root/usr/bin/hardplayer
          echo 'export QT_PLUGIN_PATH=/opt/hardplayer/PyQt6/Qt6/plugins' >> package_root/usr/bin/hardplayer
          echo 'exec /opt/hardplayer/hardplayer-bin "$@"' >> package_root/usr/bin/hardplayer
          chmod +x package_root/usr/bin/hardplayer

          mkdir -p package_root/usr/share/pixmaps
          mkdir -p package_root/usr/share/applications
          cp icon.png package_root/usr/share/pixmaps/hardplayer.png
          
          cat <<EOF > package_root/usr/share/applications/hardplayer.desktop
          [Desktop Entry]
          Name=HardPlayer
          Comment=Pro Media Player with Advanced YouTube Downloader
          Exec=hardplayer %U
          Icon=hardplayer
          Terminal=false
          Type=Application
          Categories=AudioVideo;Video;Player;
          MimeType=video/mp4;video/x-matroska;video/webm;video/x-msvideo;video/quicktime;video/x-flv;audio/mpeg;audio/x-wav;audio/flac;
          StartupNotify=true
          EOF

      - name: Generate Production Packages (DEB, RPM, Pacman)
        run: |
          DESC="HardPlayer v19: Advanced YouTube Downloader (Subtitles, Thumbnails, Chapters, Info) & Smart UI."
          VER="19.0.0"
          ARCH="${{ matrix.arch }}"
          
          fpm -s dir -t deb -n hardplayer -v $VER -a $ARCH --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -d aria2 -C package_root .
          fpm -s dir -t rpm -n hardplayer -v $VER -a $ARCH --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -d aria2 -C package_root .
          fpm -s dir -t pacman -n hardplayer -v $VER -a $ARCH --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -d aria2 -C package_root .

      - name: Deploy Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v19')
        with:
          name: HardPlayer v19.0.0 - Advanced YouTube Downloader & Extras 🚀
          body: |
            ## 📥 Download Links
            | Architecture | Ubuntu / Debian | Fedora / Suse | Arch Linux |
            | :--- | :--- | :--- | :--- |
            | **x86-64 (64-bit)** | [Download DEB](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hardplayer_19.0.0_x86_64.deb) | [Download RPM](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hardplayer-19.0.0-1.x86_64.rpm) | [Download Pacman](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hardplayer-19.0.0-1-x86_64.pkg.tar.zst) |

            ---
            
            ### What's New in v19.0.0?
            * **Advanced YouTube Downloader:** تمت ترقية نظام التحميل ليصبح أداة متكاملة. الآن أصبح بإمكانك تحميل الترجمات (Subtitles)، الصور المصغرة (Thumbnails)، دمج الفصول (Chapters)، وحفظ بيانات الفيديو، ولم يعد يقتصر على تحميل الفيديو فقط!
            * **Smart Subtitle Fetching:** نظام ذكي لسحب الترجمات (الإنجليزية والعربية افتراضياً) لتجنب حظر IP (Error 429) من يوتيوب.
            * **Enhanced Download UI:** واجهة مخصصة لاختيار الميزات الإضافية قبل التحميل، مع إمكانية إيقاف التحميل بأمان ومسح الملفات غير المكتملة.
          files: |
            *.deb
            *.rpm
            *.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}