name: HardPlayer Evolution (v23.0.1)

on:
  push:
    tags:
      - 'v23.0*'

permissions:
  contents: write

# ═══════════════════════════════════════════════════════════════════════════════
# VARIANT STRATEGY OVERVIEW
# ═══════════════════════════════════════════════════════════════════════════════
#  standalone: Nuitka --standalone (Bundled Qt)
#  system-qt:  Nuitka WITHOUT --standalone (Native OS Binary)
# ═══════════════════════════════════════════════════════════════════════════════

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 — STANDALONE (build-standalone)
  # ═══════════════════════════════════════════════════════════════════════════
  build-standalone:
    name: Build — Standalone
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OS Packaging & Compiler Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ruby ruby-dev rubygems build-essential rpm \
            libarchive-tools zstd \
            libdbus-1-dev libgirepository1.0-dev libcairo2-dev
          sudo gem install --no-document fpm

      - name: Install Python Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 python-mpv nuitka zstandard ordered-set \
                      dbus-python "PyGObject<3.51.0"

      - name: Restore Nuitka Compilation Cache
        uses: actions/cache@v4
        with:
          path: |
            __pycache__
            ~/.cache/Nuitka
          key: ${{ runner.os }}-nuitka-standalone-${{ hashFiles('**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-standalone-

      - name: Compile with Nuitka (Standalone)
        run: |
          OPTS="--remove-output --follow-imports --assume-yes-for-downloads --standalone --enable-plugin=pyqt6"
          OPTS="$OPTS --nofollow-import-to=yt_dlp --nofollow-import-to=http"
          python -m nuitka $OPTS hardplayer.py

      - name: Stage Package Tree
        run: |
          mkdir -p package_root/opt/hardplayer package_root/usr/bin
          rm -f hardplayer.dist/libssl.so* hardplayer.dist/libcrypto.so*
          cp -r hardplayer.dist/* package_root/opt/hardplayer/
          mv package_root/opt/hardplayer/hardplayer.bin package_root/opt/hardplayer/hardplayer-bin

          cp icon_in_app.png package_root/opt/hardplayer/ 2>/dev/null || true
          mkdir -p package_root/usr/share/pixmaps package_root/usr/share/applications
          cp icon.png package_root/usr/share/pixmaps/hardplayer.png 2>/dev/null || true

          cat <<'EOF' > package_root/usr/share/applications/hardplayer.desktop
          [Desktop Entry]
          Name=HardPlayer
          Comment=Pro Media Player with Advanced YouTube Downloader
          Exec=hardplayer %U
          Icon=hardplayer
          Terminal=false
          Type=Application
          Categories=AudioVideo;Video;Player;
          MimeType=video/mp4;video/x-matroska;video/webm;video/x-msvideo;video/quicktime;video/x-flv;audio/mpeg;audio/x-wav;audio/flac;
          StartupNotify=true
          EOF

      - name: Write Launcher Script (Standalone)
        run: |
          cat <<'EOF' > package_root/usr/bin/hardplayer
          #!/bin/bash
          export LD_LIBRARY_PATH=/opt/hardplayer:${LD_LIBRARY_PATH}
          export QT_PLUGIN_PATH=/opt/hardplayer/PyQt6/Qt6/plugins
          exec /opt/hardplayer/hardplayer-bin "$@"
          EOF
          chmod +x package_root/usr/bin/hardplayer

      - name: Build Packages (DEB, RPM, Pacman)
        run: |
          export PATH="$PATH:$(ruby -e 'print Gem.bindir'):$(ruby -e 'print Gem.user_dir')/bin"
          VER="23.0.1"
          PKG_NAME="hardplayer-standalone"
          DESC="HardPlayer v23.0.1 Standalone: Self-contained with fully bundled Qt6. No Qt installation required."
          BASE_DEPS="-d mpv -d ffmpeg -d yt-dlp -d aria2"

          fpm -s dir -t deb    -n "$PKG_NAME" -v "$VER" -a amd64  --description "$DESC" $BASE_DEPS -C package_root .
          fpm -s dir -t rpm    -n "$PKG_NAME" -v "$VER" -a x86_64 --description "$DESC" $BASE_DEPS -C package_root .
          fpm -s dir -t pacman -n "$PKG_NAME" -v "$VER" -a x86_64 --description "$DESC" $BASE_DEPS -C package_root .

      - name: Create Release & Upload Standalone Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v23.0')
        with:
          name: "HardPlayer v23.0.1 — True Compiled Engine 🚀"
          body: |
            ## 📥 Download Links

            | Variant | Ubuntu / Debian (DEB) | Fedora / Suse (RPM) | Arch Linux (Pacman) |
            | :--- | :--- | :--- | :--- |
            | **Standalone (Bundled Qt)** | [Download DEB](https://github.com/${{ github.repository }}/releases/download/v23.0.1/hardplayer-standalone_23.0.1_amd64.deb) | [Download RPM](https://github.com/${{ github.repository }}/releases/download/v23.0.1/hardplayer-standalone-23.0.1-1.x86_64.rpm) | [Download Pacman](https://github.com/${{ github.repository }}/releases/download/v23.0.1/hardplayer-standalone-23.0.1-1-x86_64.pkg.tar.zst) |
            | **System-Qt (Lightweight)** | [Download DEB](https://github.com/${{ github.repository }}/releases/download/v23.0.1/hardplayer-system-qt_23.0.1_amd64.deb) | [Download RPM](https://github.com/${{ github.repository }}/releases/download/v23.0.1/hardplayer-system-qt-23.0.1-1.x86_64.rpm) | [Download Pacman](https://github.com/${{ github.repository }}/releases/download/v23.0.1/hardplayer-system-qt-23.0.1-1-x86_64.pkg.tar.zst) |

            ---

            ### 🔧 What's Changed in v23.0.1?

            * **Robust Download Resumption**: Integrated a state-management system (`.json` tracking) for interrupted or manually cancelled downloads. HardPlayer will now automatically detect leftover `.part` files and resume the download exactly from where it left off, saving bandwidth and time.
            * **Smart YouTube URL Parsing**: Implemented a robust URL cleaner that automatically sanitizes user inputs. It strips unwanted parameters (like `&t=` timestamps or `&list=` playlists) to prevent erratic `yt-dlp` behavior and ensure accurate video metadata fetching.
            * **Extended Filename & UI WordWrap**: Removed arbitrary slicing on long video titles. The UI now dynamically wraps text to display the full name flawlessly. Additionally, downloaded files now append the unique YouTube `[ID]` to their names to completely prevent overwriting or naming conflicts.
            * **Granular Progress & Merging Status**: The progress UI is now fully stream-aware. It explicitly displays separate sizes for Video and Audio streams, calculates the exact downloaded megabytes, and transitions to a clear "Merging Video & Audio... Please wait ⏳" status when `ffmpeg` is finalizing the file.
            * **True Compiled System-Qt Engine**: System-Qt variant is now compiled securely inside separate OS containers (Arch, Fedora, Ubuntu) directly into a high-performance C++ binary linked specifically to that distro's Python libraries, maximizing performance and eliminating Python script exposures.
            * **Hotfix 23.0.1**: Fixed build pipeline FPM dependency pathing and OS package naming conventions for dynamic compiled targets.
          files: |
            *.deb
            *.rpm
            *.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — SYSTEM-QT (build-system-qt)
  # ═══════════════════════════════════════════════════════════════════════════
  build-system-qt:
    name: Build — System-Qt (${{ matrix.distro }})
    runs-on: ubuntu-latest
    needs: build-standalone

    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: arch
            container: archlinux:base-devel
            fpm_target: pacman
            pkg_arch_flag: "-a x86_64"
            install_cmd: "pacman -Syu --noconfirm python python-pip ruby dbus patchelf ccache zstd git"
            fpm_deps: "-d python -d python-pyqt6 -d python-mpv -d dbus-python"
            desc: "HardPlayer v23.0.1 System-Qt (Arch): Nuitka-compiled binary linked to Arch's native libpython."

          - distro: fedora
            container: fedora:latest
            fpm_target: rpm
            pkg_arch_flag: "-a x86_64"
            install_cmd: "dnf install -y gcc gcc-c++ python3 python3-pip python3-devel dbus-devel ruby ruby-devel rubygems make rpm-build zstd patchelf ccache git findutils"
            fpm_deps: "-d python3 -d python3-qt6 -d python3-mpv -d python3-dbus"
            desc: "HardPlayer v23.0.1 System-Qt (Fedora): Nuitka-compiled binary linked to Fedora's native libpython."

          - distro: ubuntu
            container: ubuntu:22.04
            fpm_target: deb
            pkg_arch_flag: "-a amd64"
            install_cmd: "apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y gcc g++ python3 python3-pip python3-dev libdbus-1-dev ruby ruby-dev rubygems build-essential rpm libarchive-tools zstd patchelf ccache git"
            fpm_deps: "-d python3 -d python3-pyqt6 -d python3-mpv -d python3-dbus"
            desc: "HardPlayer v23.0.1 System-Qt (Ubuntu): Nuitka-compiled binary linked to Ubuntu 22.04's native libpython."

    container:
      image: ${{ matrix.container }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Build Tools
        run: ${{ matrix.install_cmd }}

      - name: Install fpm
        run: gem install --no-document fpm

      - name: Install Python Libraries for Compilation
        run: pip3 install --break-system-packages nuitka zstandard ordered-set PyQt6 python-mpv dbus-python "PyGObject<3.51.0"

      - name: Restore Nuitka Compilation Cache
        uses: actions/cache@v4
        with:
          path: |
            __pycache__
            ~/.cache/Nuitka
          key: ${{ runner.os }}-nuitka-system-qt-${{ matrix.distro }}-${{ hashFiles('**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-system-qt-${{ matrix.distro }}-

      - name: Compile with Nuitka (System-Qt — No Standalone)
        run: |
          OPTS="--remove-output --follow-imports --assume-yes-for-downloads --nofollow-import-to=yt_dlp --nofollow-import-to=http"
          python3 -m nuitka $OPTS hardplayer.py

      - name: Stage Package Tree
        run: |
          mkdir -p package_root/opt/hardplayer package_root/usr/bin
          cp hardplayer.bin package_root/opt/hardplayer/hardplayer-bin
          
          if [ -d "convert" ]; then cp -r convert package_root/opt/hardplayer/; fi
          
          cp icon_in_app.png package_root/opt/hardplayer/ 2>/dev/null || true
          mkdir -p package_root/usr/share/pixmaps package_root/usr/share/applications
          cp icon.png package_root/usr/share/pixmaps/hardplayer.png 2>/dev/null || true

          cat <<'EOF' > package_root/usr/share/applications/hardplayer.desktop
          [Desktop Entry]
          Name=HardPlayer
          Comment=Pro Media Player with Advanced YouTube Downloader
          Exec=hardplayer %U
          Icon=hardplayer
          Terminal=false
          Type=Application
          Categories=AudioVideo;Video;Player;
          MimeType=video/mp4;video/x-matroska;video/webm;video/x-msvideo;video/quicktime;video/x-flv;audio/mpeg;audio/x-wav;audio/flac;
          StartupNotify=true
          EOF

      - name: Write Launcher Script (System-Qt)
        run: |
          cat <<'EOF' > package_root/usr/bin/hardplayer
          #!/bin/bash
          exec /opt/hardplayer/hardplayer-bin "$@"
          EOF
          chmod +x package_root/usr/bin/hardplayer

      - name: Build Package (${{ matrix.fpm_target }})
        run: |
          export PATH="$PATH:$(ruby -e 'print Gem.bindir'):$(ruby -e 'print Gem.user_dir')/bin"
          VER="23.0.1"
          PKG_NAME="hardplayer-system-qt"
          BASE_DEPS="-d mpv -d ffmpeg -d yt-dlp -d aria2"

          fpm -s dir -t ${{ matrix.fpm_target }} \
              -n "$PKG_NAME" -v "$VER" \
              ${{ matrix.pkg_arch_flag }} \
              --description "${{ matrix.desc }}" \
              $BASE_DEPS ${{ matrix.fpm_deps }} \
              -C package_root .

      - name: Upload System-Qt Asset to Existing Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v23.0')
        with:
          files: |
            *.deb
            *.rpm
            *.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
