name: HardPlayer Production Build (v1.1.3)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: ubuntu-latest
            name: linux

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 yt-dlp nuitka zstandard ordered-set

      - name: Install Packaging Tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm libarchive-tools zstd
          sudo gem install --no-document fpm

      - name: Build with Nuitka (Linux)
        if: runner.os == 'Linux'
        run: |
          # 1. Force Nuitka to include ALL Qt plugins, especially multimedia
          python -m nuitka --standalone --remove-output --enable-plugin=pyqt6 --include-qt-plugins=all --assume-yes-for-downloads hardplayer.py
          
          # 2. Setup standard Linux filesystem directories
          mkdir -p package_root/opt/hardplayer
          mkdir -p package_root/usr/bin
          
          # 3. Copy everything to /opt/hardplayer/
          cp -r hardplayer.dist/* package_root/opt/hardplayer/
          
          # 4. Rename the main executable to hardplayer-bin to avoid conflicts
          mv package_root/opt/hardplayer/hardplayer.bin package_root/opt/hardplayer/hardplayer-bin
          
          # 5. Create a rock-solid wrapper script in /usr/bin
          # This script ensures the program finds its multimedia plugins and libraries
          echo '#!/bin/bash' > package_root/usr/bin/hardplayer
          echo 'export LD_LIBRARY_PATH=/opt/hardplayer:$LD_LIBRARY_PATH' >> package_root/usr/bin/hardplayer
          echo 'export QT_PLUGIN_PATH=/opt/hardplayer/PyQt6/Qt6/plugins' >> package_root/usr/bin/hardplayer
          echo 'exec /opt/hardplayer/hardplayer-bin "$@"' >> package_root/usr/bin/hardplayer
          chmod +x package_root/usr/bin/hardplayer

      - name: Create Linux Packages (DEB, RPM, Arch)
        if: runner.os == 'Linux'
        run: |
          fpm -s dir -t deb -n hardplayer -v 1.1.3 -d ffmpeg -C package_root .
          fpm -s dir -t rpm -n hardplayer -v 1.1.3 -d ffmpeg -C package_root .
          fpm -s dir -t pacman -n hardplayer -v 1.1.3 -d ffmpeg -C package_root .

      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          # Build standalone for Windows WITHOUT --windows-disable-console to allow terminal logs
          python -m nuitka --standalone --remove-output --enable-plugin=pyqt6 --include-qt-plugins=all --assume-yes-for-downloads hardplayer.py
          Compress-Archive -Path hardplayer.dist -DestinationPath hardplayer-windows-x64.zip

      - name: Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            *.deb
            *.rpm
            *.zst
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}