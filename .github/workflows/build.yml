name: HardPlayer Multi-Arch Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            python-arch: x64
          - os: windows-latest
            arch: x86
            python-arch: x86
          - os: ubuntu-latest
            arch: x86_64
            python-arch: x64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: ${{ matrix.python-arch }}

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install PyQt6 yt-dlp nuitka

      - name: Build with Nuitka (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m nuitka --remove-output hardplayer.py
          mv hardplayer.bin hardplayer-linux-${{ matrix.arch }}

      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m nuitka --standalone --remove-output --windows-disable-console --assume-yes-for-downloads hardplayer.py
          move hardplayer.exe hardplayer-windows-${{ matrix.arch }}.exe

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            hardplayer-linux-*
            hardplayer-windows-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}