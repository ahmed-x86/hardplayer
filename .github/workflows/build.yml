name: HardPlayer Evolution (v14.0.0)

on:
  push:
    tags:
      - 'v14*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Package (Linux Multi-Distro)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OS Packaging Tools & D-Bus Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm libarchive-tools zstd libdbus-1-dev libgirepository1.0-dev libcairo2-dev
          sudo gem install --no-document fpm

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 python-mpv nuitka zstandard ordered-set dbus-python "PyGObject<3.51.0"

      - name: Build with Nuitka & Setup Desktop Entry
        run: |
          python -m nuitka --standalone --remove-output --enable-plugin=pyqt6 --follow-imports --assume-yes-for-downloads hardplayer.py
          
          rm -f hardplayer.dist/libssl.so* hardplayer.dist/libcrypto.so*
          
          mkdir -p package_root/opt/hardplayer
          mkdir -p package_root/usr/bin
          cp -r hardplayer.dist/* package_root/opt/hardplayer/
          mv package_root/opt/hardplayer/hardplayer.bin package_root/opt/hardplayer/hardplayer-bin
          
          # Copy icon to ensure it appears inside the app
          cp icon_in_app.png package_root/opt/hardplayer/
          
          echo '#!/bin/bash' > package_root/usr/bin/hardplayer
          echo 'export LD_LIBRARY_PATH=/opt/hardplayer:$LD_LIBRARY_PATH' >> package_root/usr/bin/hardplayer
          echo 'export QT_PLUGIN_PATH=/opt/hardplayer/PyQt6/Qt6/plugins' >> package_root/usr/bin/hardplayer
          echo 'exec /opt/hardplayer/hardplayer-bin "$@"' >> package_root/usr/bin/hardplayer
          chmod +x package_root/usr/bin/hardplayer

          mkdir -p package_root/usr/share/pixmaps
          mkdir -p package_root/usr/share/applications
          cp icon.png package_root/usr/share/pixmaps/hardplayer.png
          
          cat <<EOF > package_root/usr/share/applications/hardplayer.desktop
          [Desktop Entry]
          Name=HardPlayer
          Comment=VLC-Style Modular Player with Catppuccin Theme
          Exec=hardplayer %U
          Icon=hardplayer
          Terminal=false
          Type=Application
          Categories=AudioVideo;Video;Player;
          MimeType=video/mp4;video/x-matroska;video/webm;video/x-msvideo;video/quicktime;video/x-flv;audio/mpeg;audio/x-wav;audio/flac;
          StartupNotify=true
          EOF

      - name: Generate Production Packages (DEB, RPM, Pacman)
        run: |
          DESC="HardPlayer v14: Introduces Floating Playlist Overlay, Lazy Loading for large directories, and improved local thumbnail extraction."
          
          fpm -s dir -t deb -n hardplayer -v 14.0.0 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -C package_root .
          fpm -s dir -t rpm -n hardplayer -v 14.0.0 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -C package_root .
          fpm -s dir -t pacman -n hardplayer -v 14.0.0 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -C package_root .

      - name: Deploy Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v14')
        with:
          name: HardPlayer v14.0.0 - Playlist Overlay & Lazy Loading 📜⚡
          body: |
            ### What's New in v14.0.0?
            * **Floating Playlist Overlay (📜):** A new frameless, translucent sidebar overlay for managing local folder media directly inside the player window without altering the video aspect ratio.
            * **Lazy Loading Engine (⚡):** Intelligently loads 6 videos at a time with a "Load More" button. This completely eliminates UI freezing when opening massive media directories.
            * **Thumbnail Generator Polish:** Improved precision and handling for extracting local video thumbnails.
            * *Notice: YouTube playlist integration is pending and currently not supported.*
            
            **Previous Enhancements Included:**
            * Persistent Hardware Caching (`~/.cache/hardplayer/hw.txt`).
            * "Hardware (Default)" top menu configuration.
            * Deep OS Integration ("Open With..." & System File Associations).
            * Power CLI with explicit GPU and Quality overrides.
          files: |
            *.deb
            *.rpm
            *.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}