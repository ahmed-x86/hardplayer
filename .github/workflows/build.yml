name: HardPlayer Multi-Distro Build (v1.0.6)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: ubuntu-latest
            name: linux

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 yt-dlp nuitka zstandard ordered-set

      # إعداد أدوات التغليف (FPM) على اللينكس فقط
      - name: Install Packaging Tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm
          sudo gem install --no-document fpm

      - name: Build with Nuitka (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m nuitka --standalone --remove-output --include-qt-plugins=all hardplayer.py
          # نقل الملف التنفيذي لمجلد سهل التعامل معه
          mkdir -p package_root/usr/bin
          cp -r hardplayer.dist/* package_root/usr/bin/
          mv package_root/usr/bin/hardplayer package_root/usr/bin/hardplayer-bin
          
          # إنشاء ملف تشغيل بسيط (Wrapper) ليجد المكتبات بجانبه
          echo -e '#!/bin/bash\n/usr/bin/hardplayer-bin "$@"' > package_root/usr/bin/hardplayer
          chmod +x package_root/usr/bin/hardplayer

      - name: Create Linux Packages (DEB, RPM, Arch)
        if: runner.os == 'Linux'
        run: |
          # 1. Debian/Ubuntu (.deb)
          fpm -s dir -t deb -n hardplayer -v 1.0.6 -C package_root .
          
          # 2. Fedora (.rpm)
          fpm -s dir -t rpm -n hardplayer -v 1.0.6 -C package_root .
          
          # 3. Arch Linux (.pkg.tar.zst)
          fpm -s dir -t pacman -n hardplayer -v 1.0.6 -C package_root .

      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m nuitka --standalone --remove-output --windows-disable-console --assume-yes-for-downloads --include-qt-plugins=all hardplayer.py
          Compress-Archive -Path hardplayer.dist -DestinationPath hardplayer-windows-x64.zip

      - name: Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            *.deb
            *.rpm
            *.zst
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}