name: HardPlayer Evolution (v9.0.0)

on:
  push:
    tags:
      - 'v9*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Package (Linux Multi-Distro)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OS Packaging Tools & D-Bus Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm libarchive-tools zstd libdbus-1-dev libgirepository1.0-dev libcairo2-dev
          sudo gem install --no-document fpm

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 python-mpv nuitka zstandard ordered-set dbus-python "PyGObject<3.51.0"

      - name: Build with Nuitka & Setup Desktop Entry
        run: |
          # بناء البرنامج مع التأكد من تضمين كافة الموديولات الجديدة (UI components & Logic)
          python -m nuitka --standalone --remove-output --enable-plugin=pyqt6 --follow-imports --assume-yes-for-downloads hardplayer.py
          
          # حذف مكتبات التشفير لضمان التوافقية مع توزيعات Linux المختلفة وتجنب Segfault
          rm -f hardplayer.dist/libssl.so* hardplayer.dist/libcrypto.so*
          
          mkdir -p package_root/opt/hardplayer
          mkdir -p package_root/usr/bin
          cp -r hardplayer.dist/* package_root/opt/hardplayer/
          mv package_root/opt/hardplayer/hardplayer.bin package_root/opt/hardplayer/hardplayer-bin
          
          echo '#!/bin/bash' > package_root/usr/bin/hardplayer
          echo 'export LD_LIBRARY_PATH=/opt/hardplayer:$LD_LIBRARY_PATH' >> package_root/usr/bin/hardplayer
          echo 'export QT_PLUGIN_PATH=/opt/hardplayer/PyQt6/Qt6/plugins' >> package_root/usr/bin/hardplayer
          echo 'exec /opt/hardplayer/hardplayer-bin "$@"' >> package_root/usr/bin/hardplayer
          chmod +x package_root/usr/bin/hardplayer

          mkdir -p package_root/usr/share/pixmaps
          mkdir -p package_root/usr/share/applications
          cp icon.png package_root/usr/share/pixmaps/hardplayer.png
          
          cat <<EOF > package_root/usr/share/applications/hardplayer.desktop
          [Desktop Entry]
          Name=HardPlayer
          Comment=VLC-Style Modular Player with Catppuccin Theme
          Exec=hardplayer %U
          Icon=hardplayer
          Terminal=false
          Type=Application
          Categories=AudioVideo;Video;Player;
          StartupNotify=true
          EOF

      - name: Generate Production Packages (DEB, RPM, Pacman)
        run: |
          DESC="HardPlayer v9: Native YouTube search integration powered by yt-dlp, lightning-fast parsing, and visual result cards."
          
          # توليد الحزم بالإصدار الجديد 9.0.0
          fpm -s dir -t deb -n hardplayer -v 9.0.0 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -C package_root .
          fpm -s dir -t rpm -n hardplayer -v 9.0.0 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -C package_root .
          fpm -s dir -t pacman -n hardplayer -v 9.0.0 --description "$DESC" -d mpv -d ffmpeg -d yt-dlp -C package_root .

      - name: Deploy Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v9')
        with:
          name: HardPlayer v9.0.0 - The Search Revolution 🔍🚀
          body: |
            ### What's New in v9.0.0?
            * **Native YouTube Search:** Directly search YouTube from within the application. Enter a query instead of a URL to instantly fetch the top 5 results.
            * **Lightning-Fast Parsing:** Powered by `yt-dlp`'s `--flat-playlist` capability, delivering search results in milliseconds without heavy metadata extraction.
            * **Visual Result Cards:** Search results are displayed in beautifully designed, Catppuccin-themed cards featuring asynchronous thumbnails (zero UI freezing), channel info, and descriptions.
            * **Zero External Bloat:** Reliable native JSON extraction using `yt-dlp`, completely bypassing dependency hell from unstable third-party search libraries.
            * **Unified Media Dialog:** The `P` shortcut is now a universal hub for local files, direct URLs, and YouTube searches.
          files: |
            *.deb
            *.rpm
            *.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}