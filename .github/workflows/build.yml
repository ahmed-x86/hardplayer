name: HardPlayer Evolution (v22.3.0)

on:
  push:
    tags:
      - 'v22.3*'

permissions:
  contents: write

# ═══════════════════════════════════════════════════════════════════════════════
# VARIANT STRATEGY OVERVIEW
# ═══════════════════════════════════════════════════════════════════════════════
#
#  ┌─────────────────┬─────────────────────────────────────────────────────────┐
#  │ Variant         │ Build Strategy                                          │
#  ├─────────────────┼─────────────────────────────────────────────────────────┤
#  │ standalone      │ Nuitka --standalone + --enable-plugin=pyqt6             │
#  │                 │ All Qt6 libs bundled into hardplayer.dist.              │
#  │                 │ Runs on any distro with mpv/ffmpeg/yt-dlp/aria2.        │
#  ├─────────────────┼─────────────────────────────────────────────────────────┤
#  │ system-qt       │ PURE PYTHON — NO Nuitka compilation.                   │
#  │                 │ Packages hardplayer.py directly into /opt/hardplayer/.  │
#  │                 │ Launcher calls: python3 /opt/hardplayer/hardplayer.py   │
#  │                 │                                                         │
#  │                 │ WHY pure Python?                                        │
#  │                 │ Nuitka without --standalone dynamically links the       │
#  │                 │ resulting binary to the build host's libpython          │
#  │                 │ (e.g. libpython3.10.so.1.0 on ubuntu-latest).           │
#  │                 │ Arch users get a crash at launch because their system   │
#  │                 │ ships libpython3.12 (or newer). Pure Python packaging   │
#  │                 │ completely eliminates this ABI mismatch — the launcher  │
#  │                 │ always calls whatever python3 is installed on the host. │
#  └─────────────────┴─────────────────────────────────────────────────────────┘

jobs:
  build:
    name: Build (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Variant A: Standalone ─────────────────────────────────────────────
          # Nuitka يدمج PyQt6 بالكامل داخل hardplayer.dist.
          # الناتج مكتفٍ بذاته — لا يحتاج Qt أو Python مثبتَين على الجهاز المستهدف.
          # ─────────────────────────────────────────────────────────────────────
          - variant: standalone
            pkg_suffix: standalone
            arch: x86_64

          # ── Variant B: System-Qt (Pure Python) ───────────────────────────────
          # لا Nuitka، لا تجميع، لا ربط ديناميكي بـ libpython.
          # يُحزَّم hardplayer.py مباشرةً، والمُشغِّل يستدعي python3 الخاص بالنظام.
          # هذا هو الحل الجذري لمشكلة libpython3.10 على Arch/Fedora.
          # ─────────────────────────────────────────────────────────────────────
          - variant: system-qt
            pkg_suffix: system-qt
            arch: x86_64

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 2. Python (Standalone فقط) ────────────────────────────────────────────
      # system-qt لا يحتاج بيئة Python في وقت البناء على الإطلاق —
      # لا توجد خطوة تجميع، وpython3 المستهدَف هو ما على جهاز المستخدم.
      - name: Set up Python
        if: matrix.variant == 'standalone'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 3. أدوات تغليف الحزم (مشترك) ─────────────────────────────────────────
      # ruby/fpm مطلوبان في كلا الـ variant لتوليد DEB/RPM/Pacman.
      - name: Install OS Packaging & Compiler Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ruby ruby-dev rubygems build-essential rpm \
            libarchive-tools zstd
          sudo gem install --no-document fpm

      # ── 4a. تبعيات Python (Standalone) ───────────────────────────────────────
      - name: Install Python Build Dependencies (Standalone)
        if: matrix.variant == 'standalone'
        run: |
          python -m pip install --upgrade pip
          # yt-dlp مستبعد من pip عمداً — مُعلَن كتبعية نظام عبر fpm (-d yt-dlp).
          # تثبيته هنا يجعل Nuitka يتتبع 300+ submodule → بناء 80+ دقيقة (كارثة v19).
          pip install PyQt6 python-mpv nuitka zstandard ordered-set \
                      dbus-python "PyGObject<3.51.0"

      # ── 4b. System-Qt: لا تثبيت مطلوب ───────────────────────────────────────
      # لا Nuitka، لا PyQt6، لا pip — hardplayer.py يُحزَّم كما هو.
      # python3 و PyQt6 على جهاز المستخدم هما ما سيُشغِّلان البرنامج.
      # (هذه الخطوة موثَّقة صراحةً لتوضيح القرار المعماري، لا لتنفيذ شيء)
      - name: Skip Build Dependencies (System-Qt — Pure Python)
        if: matrix.variant == 'system-qt'
        run: |
          echo "ℹ️  system-qt variant uses pure Python packaging."
          echo "    No Nuitka compilation → no libpython ABI to worry about."
          echo "    The host's python3 executes hardplayer.py directly at runtime."

      # ── 5. كاش Nuitka (Standalone فقط) ───────────────────────────────────────
      #
      # Key مشتق من محتوى ملفات .py فقط — لا من رقم الإصدار.
      # v22 → v23 يُعيد استخدام الكاش بلا تكلفة إضافية.
      #
      # المسارات المُخزَّنة:
      #   __pycache__      — bytecode للتحليل السريع
      #   ~/.cache/Nuitka  — كاش ترجمة C (ccache/Scons)
      - name: Restore Nuitka Compilation Cache
        if: matrix.variant == 'standalone'
        uses: actions/cache@v4
        with:
          path: |
            __pycache__
            ~/.cache/Nuitka
          key: ${{ runner.os }}-nuitka-standalone-${{ hashFiles('**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-standalone-

      # ── 6. تجميع Nuitka (Standalone فقط) ─────────────────────────────────────
      - name: Compile with Nuitka (Standalone)
        if: matrix.variant == 'standalone'
        run: |
          OPTS="--remove-output"
          OPTS="$OPTS --follow-imports"
          OPTS="$OPTS --assume-yes-for-downloads"
          OPTS="$OPTS --standalone"
          OPTS="$OPTS --enable-plugin=pyqt6"

          # ── حارس yt_dlp الأساسي ───────────────────────────────────────────────
          # يمنع تتبع 300+ submodule داخل yt_dlp → بناء سريع كما في v14.
          OPTS="$OPTS --nofollow-import-to=yt_dlp"

          # ── حارس http (مكمِّل لحارس yt_dlp) ─────────────────────────────────
          # Nuitka يلتقط أحياناً استيرادات yt_dlp الجزئية (http.cookies ...)
          # قبل الوصول لحد --nofollow-import-to=yt_dlp.
          # النتيجة: "No module named 'http.cookies'" عند التشغيل.
          # http مكتبة standard — متاحة دائماً في بيئة التشغيل.
          OPTS="$OPTS --nofollow-import-to=http"

          python -m nuitka $OPTS hardplayer.py

      # ── 7. تجهيز شجرة الحزمة ─────────────────────────────────────────────────
      - name: Stage Package Tree
        run: |
          mkdir -p package_root/opt/hardplayer package_root/usr/bin

          if [ "${{ matrix.variant }}" = "standalone" ]; then
            # ── Standalone: نشر محتويات hardplayer.dist ───────────────────────
            # إزالة OpenSSL المدمجة لتجنب تعارضها مع مكتبات النظام
            rm -f hardplayer.dist/libssl.so* hardplayer.dist/libcrypto.so*
            cp -r hardplayer.dist/* package_root/opt/hardplayer/
            # Nuitka يولِّد hardplayer.bin داخل .dist — نعيد تسميته للمُشغِّل
            mv package_root/opt/hardplayer/hardplayer.bin \
               package_root/opt/hardplayer/hardplayer-bin

          else
            # ── System-Qt (Pure Python): نسخ ملفات .py مباشرةً ──────────────
            #
            # لماذا لا hardplayer.bin؟
            # hardplayer.bin من Nuitka (بدون --standalone) مرتبط ديناميكياً بـ
            # libpython3.10.so.1.0 (إصدار build host). هذا يُودي بالبرنامج على
            # Arch (libpython3.12) وأي توزيعة بإصدار بايثون مختلف.
            #
            # الحل: نسخ ملفات .py — python3 على جهاز المستخدم يُشغِّلها مباشرةً
            # دون أي ربط بـ libpython من جهاز البناء.
            #
            # ملاحظة: نحن ننسخ كل ملفات .py في جذر المستودع بالإضافة لمجلد convert.
            find . -maxdepth 1 -name "*.py" -exec cp {} package_root/opt/hardplayer/ \;
            if [ -d "convert" ]; then
              cp -r convert package_root/opt/hardplayer/
            fi
          fi

          # أيقونة داخل التطبيق (مشترك)
          cp icon_in_app.png package_root/opt/hardplayer/

          # أيقونة النظام وملف .desktop (مشترك)
          mkdir -p package_root/usr/share/pixmaps \
                   package_root/usr/share/applications
          cp icon.png package_root/usr/share/pixmaps/hardplayer.png

          cat <<'EOF' > package_root/usr/share/applications/hardplayer.desktop
          [Desktop Entry]
          Name=HardPlayer
          Comment=Pro Media Player with Advanced YouTube Downloader
          Exec=hardplayer %U
          Icon=hardplayer
          Terminal=false
          Type=Application
          Categories=AudioVideo;Video;Player;
          MimeType=video/mp4;video/x-matroska;video/webm;video/x-msvideo;video/quicktime;video/x-flv;audio/mpeg;audio/x-wav;audio/flac;
          StartupNotify=true
          EOF

      # ── 8a. Launcher: Standalone ──────────────────────────────────────────────
      # QT_PLUGIN_PATH يشير إلى plugins المدمجة داخل hardplayer.dist.
      # --enable-plugin=pyqt6 هو من نسخ هذه الـ plugins → المسار موجود هنا فقط.
      - name: Write Launcher Script (Standalone)
        if: matrix.variant == 'standalone'
        run: |
          cat <<'EOF' > package_root/usr/bin/hardplayer
          #!/bin/bash
          export LD_LIBRARY_PATH=/opt/hardplayer:${LD_LIBRARY_PATH}
          export QT_PLUGIN_PATH=/opt/hardplayer/PyQt6/Qt6/plugins
          exec /opt/hardplayer/hardplayer-bin "$@"
          EOF
          chmod +x package_root/usr/bin/hardplayer

      # ── 8b. Launcher: System-Qt (Pure Python) ────────────────────────────────
      #
      # الفرق الجوهري عن الـ standalone launcher:
      #   لا يوجد hardplayer-bin — المُشغِّل يستدعي python3 مباشرةً.
      #   لا QT_PLUGIN_PATH — Qt تُحدِّد plugins من مسارات النظام تلقائياً.
      #   لا LD_LIBRARY_PATH لـ PyQt6 — مكتباتها في /usr/lib (مسار النظام الافتراضي).
      #
      # لماذا هذا يحل مشكلة libpython؟
      #   لأنه لا يوجد binary مرتبط بـ libpython من الأساس.
      #   `python3` الذي سيُشغِّل hardplayer.py هو python3 الخاص بالمستخدم
      #   (3.12 على Arch، 3.11 على Fedora، إلخ) وهو بطبيعة الحال متوافق
      #   مع PyQt6 المثبتة على نفس النظام.
      - name: Write Launcher Script (System-Qt)
        if: matrix.variant == 'system-qt'
        run: |
          cat <<'EOF' > package_root/usr/bin/hardplayer
          #!/bin/bash
          # ── Pure Python Launcher ──────────────────────────────────────────────
          # لا binary مرتبط بـ libpython → لا ABI mismatch بين التوزيعات.
          # python3 المثبت على النظام يُشغِّل hardplayer.py مباشرةً.

          # ── PYTHONPATH: اكتشاف ديناميكي عبر python3 نفسه ────────────────────
          # نسأل python3 المثبت على جهاز المستخدم عن مساراته الحقيقية.
          # يعمل على:
          #   Arch   → /usr/lib/python3.12/site-packages
          #   Debian → /usr/lib/python3/dist-packages
          #   Fedora → /usr/lib/python3.12/site-packages
          # بغض النظر عن رقم الإصدار الذي يتغير مع كل تحديث.
          if command -v python3 &>/dev/null; then
            PYQT6_PATHS="$(python3 -c \
              'import site, os
          paths = [p for p in site.getsitepackages() if os.path.exists(p)]
          print(":".join(paths))' 2>/dev/null)"
          fi

          if [ -n "${PYQT6_PATHS}" ]; then
            export PYTHONPATH="${PYQT6_PATHS}:${PYTHONPATH}"
          else
            # Fallback آمن لو python3 غير متاح في $PATH لسبب استثنائي
            for p in \
              /usr/lib/python3/dist-packages \
              /usr/lib/python3*/site-packages \
              /usr/local/lib/python3*/dist-packages; do
              [ -d "$p" ] && export PYTHONPATH="${p}:${PYTHONPATH}"
            done
          fi

          # Qt تُحدِّد plugins من مسارات النظام تلقائياً (/usr/lib/qt6/plugins إلخ)
          # لا نتدخل في QT_PLUGIN_PATH لتجنب تعارض إصدارات Qt

          exec python3 /opt/hardplayer/hardplayer.py "$@"
          EOF
          chmod +x package_root/usr/bin/hardplayer

      # ── 9. توليد حزم DEB / RPM / Pacman ──────────────────────────────────────
      #
      # ثلاثة أوامر fpm منفصلة لكل نوع حزمة — أسماء التبعيات مختلفة:
      #
      #   DEB (Debian/Ubuntu) → python3-pyqt6
      #   RPM (Fedora/SUSE)   → python3-pyqt6
      #   Pacman (Arch)       → python-pyqt6   ← بدون "3" — هذا هو الاسم الصحيح
      #
      # الفصل ضروري لأن fpm لا يدعم أسماء تبعيات مختلفة لأنواع حزم مختلفة
      # في أمر واحد.
      - name: Build Packages (DEB, RPM, Pacman)
        run: |
          VER="22.3.0"
          PKG_NAME="hardplayer-${{ matrix.pkg_suffix }}"
          BASE_DEPS="-d mpv -d ffmpeg -d yt-dlp -d aria2"

          if [ "${{ matrix.variant }}" = "standalone" ]; then
            DESC="HardPlayer v22.3.0 Standalone: Self-contained with fully bundled Qt6. No Qt installation required."

            # Standalone: لا تبعية Qt — Qt مدمجة بالكامل داخل الحزمة
            fpm -s dir -t deb    -n "$PKG_NAME" -v "$VER" -a amd64  \
                --description "$DESC" $BASE_DEPS                      \
                -C package_root .

            fpm -s dir -t rpm    -n "$PKG_NAME" -v "$VER" -a x86_64  \
                --description "$DESC" $BASE_DEPS                      \
                -C package_root .

            fpm -s dir -t pacman -n "$PKG_NAME" -v "$VER" -a x86_64  \
                --description "$DESC" $BASE_DEPS                      \
                -C package_root .

          else
            # ── System-Qt: نضيف تبعية python3 + PyQt6 من حزم النظام ──────────
            # python3 مطلوب في runtime لتشغيل hardplayer.py
            DESC="HardPlayer v22.3.0 System-Qt: Lightweight pure Python build. Requires system python3 and PyQt6."

            # DEB (Debian/Ubuntu)
            fpm -s dir -t deb    -n "$PKG_NAME" -v "$VER" -a amd64  \
                --description "$DESC" $BASE_DEPS                      \
                -d python3 -d python3-pyqt6                           \
                -C package_root .

            # RPM (Fedora/SUSE)
            fpm -s dir -t rpm    -n "$PKG_NAME" -v "$VER" -a x86_64  \
                --description "$DESC" $BASE_DEPS                      \
                -d python3 -d python3-pyqt6                           \
                -C package_root .

            # Pacman (Arch) — python-pyqt6 بدون "3"
            fpm -s dir -t pacman -n "$PKG_NAME" -v "$VER" -a x86_64  \
                --description "$DESC" $BASE_DEPS                      \
                -d python -d python-pyqt6                             \
                -C package_root .
          fi

      # ── 10a. إنشاء الـ Release (Standalone فقط) ──────────────────────────────
      #
      # Standalone هو المُنشئ الرسمي لـ metadata الـ release (name + body).
      # System-Qt يُلحق ملفاته فقط لتجنب race condition على metadata.
      - name: Create Release & Upload Standalone Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v22.3') && matrix.variant == 'standalone'
        with:
          name: "HardPlayer v22.3.0 — Accelerated Native Engine 🚀"
          body: |
            ## 📥 Download Links

            ### 🔵 Variant A — Standalone *(recommended)*
            > Fully bundled with Qt6. Works out of the box on any Linux distribution with `mpv`, `ffmpeg`, `yt-dlp`, and `aria2`. No Python or Qt required on the host.

            | | Ubuntu / Debian | Fedora / SUSE | Arch Linux |
            |---|---|---|---|
            | **x86-64** | [📦 DEB](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hardplayer-standalone_22.3.0_amd64.deb) | [📦 RPM](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hardplayer-standalone-22.3.0-1.x86_64.rpm) | [📦 Pacman](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hardplayer-standalone-22.3.0-1-x86_64.pkg.tar.zst) |

            ---

            ### 🟢 Variant B — System-Qt *(lightweight)*
            > Pure Python distribution — packages `hardplayer.py` directly.
            > Runs via the host's `python3` interpreter, so there is **zero `libpython` ABI dependency** from the build machine.
            > Requires `python3` + `python3-pyqt6` (Debian/Fedora) or `python-pyqt6` (Arch) — installed automatically as a package dependency.

            | | Ubuntu / Debian | Fedora / SUSE | Arch Linux |
            |---|---|---|---|
            | **x86-64** | [📦 DEB](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hardplayer-system-qt_22.3.0_amd64.deb) | [📦 RPM](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hardplayer-system-qt-22.3.0-1.x86_64.rpm) | [📦 Pacman](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hardplayer-system-qt-22.3.0-1-x86_64.pkg.tar.zst) |

            ---

            ### 🔧 What's Changed in v22.3.0?

            * **📁 System-Qt Packaging Fix:** Correctly included the `convert/` directory in the Pure Python build, restoring all conversion APIs and features that were missing in the previous release.
            * **🔥 libpython ABI Fix (System-Qt):** Retains the pure Python package architecture — executing directly via the host's `python3` to eliminate `libpython` mismatches on Arch, Fedora, and any distro with a different Python version than the CI build host.
            * **🗺️ Universal PYTHONPATH Discovery:** The launcher uses `site.getsitepackages()` to locate PyQt6 dynamically at runtime, working correctly on any distribution regardless of Python version.
            * **📦 Arch Dependency Fixed:** Pacman package correctly declares `python-pyqt6` and `python` (not `python3-pyqt6`) for seamless Arch Linux installation.
            * **🛡️ HTTP Cookies Guard (Standalone):** `--nofollow-import-to=http` prevents missing module errors from partial `yt-dlp` import traces in the Nuitka build.
          files: |
            *.deb
            *.rpm
            *.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 10b. إلحاق ملفات System-Qt بالـ Release الموجود ─────────────────────
      # name + body محذوفان عمداً — Standalone هو المُنشئ الرسمي.
      # هذا الـ step يُلحق الملفات فقط دون لمس metadata الـ release.
      - name: Upload System-Qt Assets to Existing Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v22.3') && matrix.variant == 'system-qt'
        with:
          files: |
            *.deb
            *.rpm
            *.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}